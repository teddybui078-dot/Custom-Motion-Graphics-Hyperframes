<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=3840, height=2160" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 3840px;
        height: 2160px;
        overflow: hidden;
        /* Dark navy with a faint cool glow lifting the center, like the reference */
        background:
          radial-gradient(
            120% 90% at 50% 42%,
            #14203c 0%,
            #0a1124 42%,
            #060a16 70%,
            #04060f 100%
          );
        font-family: "Montserrat", "Helvetica Neue", Arial, sans-serif;
      }

      /* Stage fills the canvas and centers the bar */
      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ===== The dock / bar ===== */
      .bar {
        position: relative;
        width: 2180px;
        height: 610px;
        border-radius: 104px;
        /* Dark navy, a touch lighter at the top edge */
        background: linear-gradient(180deg, #1b2540 0%, #121a30 55%, #0d1426 100%);
        border: 2px solid rgba(255, 255, 255, 0.07);
        /* Two directional WHITE blooms = soft glow hugging the top-left & top-right
           corners (the reference look), plus a deep drop shadow for separation,
           plus a faint inner top rim highlight. */
        box-shadow:
          -34px -26px 90px rgba(255, 255, 255, 0.22),
          34px -26px 90px rgba(255, 255, 255, 0.22),
          0 60px 160px rgba(0, 0, 0, 0.65),
          inset 0 3px 0 rgba(255, 255, 255, 0.10);
        transform-origin: center 60%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="12"
      data-width="3840"
      data-height="2160"
    >
      <div class="stage">
        <div class="bar" id="bar">
          <!-- logos + cursor added in the next step -->
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // Animation added in a later step.
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
