<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        /* Warm off-white with a barely-there lighter center */
        background:
          radial-gradient(120% 100% at 50% 42%, #fbfaf6 0%, #f4f2ec 60%, #efece4 100%);
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      }

      .stage {
        position: absolute;
        inset: 0;
      }

      /* Connector / dot / pulse layer sits BEHIND the icons */
      .net {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        overflow: visible;
        z-index: 1;
      }
      .conn {
        fill: none;
        stroke: #d3cfc4;
        stroke-width: 3;
        stroke-linecap: round;
      }
      .pulse {
        fill: none;
        stroke-width: 3;
        transform-box: fill-box;
        transform-origin: center;
      }

      /* App tiles on top */
      .icon {
        position: absolute;
        width: 150px;
        height: 150px;
        border-radius: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        transform-origin: center center;
        z-index: 2;
        box-shadow:
          0 20px 40px rgba(36, 32, 26, 0.16),
          0 5px 12px rgba(36, 32, 26, 0.09);
      }
      .icon .glyph {
        width: 70px;
        height: 70px;
      }
      .c0 { background: linear-gradient(150deg, #6f72f5 0%, #4f46e5 100%); }
      .c1 { background: linear-gradient(150deg, #1ec9b5 0%, #0d9488 100%); }
      .c2 { background: linear-gradient(150deg, #fbb43a 0%, #e08706 100%); }
      .c3 { background: linear-gradient(150deg, #fb556d 0%, #e11d48 100%); }
      .c4 { background: linear-gradient(150deg, #9b6cff 0%, #7c3aed 100%); }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="8"
      data-width="1920"
      data-height="1080"
    >
      <div class="stage">
        <svg class="net" id="net" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
          <!-- connectors, traveling dots, and pulse rings are generated by the script -->
        </svg>

        <!-- App tiles (positioned by the script). Glyphs are simple white marks. -->
        <div class="icon c0" data-i="0">
          <svg class="glyph" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 2 L4 14 H10 L9 22 L20 9 H13 Z" fill="#fff" />
          </svg>
        </div>
        <div class="icon c1" data-i="1">
          <svg class="glyph" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="13" rx="3.5" fill="#fff" />
            <path d="M7 16 L7 21.5 L13 16 Z" fill="#fff" />
          </svg>
        </div>
        <div class="icon c2" data-i="2">
          <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="12" cy="6" rx="7.5" ry="3" />
            <path d="M4.5 6 V18 C4.5 19.7 8 21 12 21 C16 21 19.5 19.7 19.5 18 V6" />
            <path d="M4.5 12 C4.5 13.7 8 15 12 15 C16 15 19.5 13.7 19.5 12" />
          </svg>
        </div>
        <div class="icon c3" data-i="3">
          <svg class="glyph" viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="7.5" height="7.5" rx="2.2" />
            <rect x="13.5" y="3" width="7.5" height="7.5" rx="2.2" />
            <rect x="3" y="13.5" width="7.5" height="7.5" rx="2.2" />
            <rect x="13.5" y="13.5" width="7.5" height="7.5" rx="2.2" />
          </svg>
        </div>
        <div class="icon c4" data-i="4">
          <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
            <line x1="7" y1="12" x2="16.5" y2="6.5" />
            <line x1="7" y1="12" x2="16.5" y2="17.5" />
            <circle cx="6" cy="12" r="2.6" fill="#fff" stroke="none" />
            <circle cx="18" cy="6" r="2.6" fill="#fff" stroke="none" />
            <circle cx="18" cy="18" r="2.6" fill="#fff" stroke="none" />
          </svg>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const SVGNS = "http://www.w3.org/2000/svg";

      const net = document.getElementById("net");
      const icons = Array.from(document.querySelectorAll(".icon"));

      // Node colours (match the .cN tile gradients) and a loose horizontal arc.
      const colors = ["#5b5ef2", "#10b6a3", "#f0990a", "#f23b58", "#8b5cf6"];
      const centers = [
        { x: 320, y: 590 },
        { x: 640, y: 515 },
        { x: 960, y: 480 },
        { x: 1280, y: 515 },
        { x: 1600, y: 590 },
      ];
      const ICON = 150;

      // Place tiles at their node centers.
      icons.forEach((ic, i) => {
        ic.style.left = centers[i].x - ICON / 2 + "px";
        ic.style.top = centers[i].y - ICON / 2 + "px";
      });

      // Build connectors (adjacent chain), traveling dots, and pulse rings.
      const conns = [];
      const dots = [];
      for (let i = 0; i < centers.length - 1; i++) {
        const a = centers[i];
        const b = centers[i + 1];
        const len = Math.hypot(b.x - a.x, b.y - a.y);

        const line = document.createElementNS(SVGNS, "line");
        line.setAttribute("class", "conn");
        line.setAttribute("x1", a.x);
        line.setAttribute("y1", a.y);
        line.setAttribute("x2", b.x);
        line.setAttribute("y2", b.y);
        line.style.strokeDasharray = len;
        line.style.strokeDashoffset = len; // hidden until drawn
        net.appendChild(line);
        conns.push(line);

        const dot = document.createElementNS(SVGNS, "circle");
        dot.setAttribute("class", "dot");
        dot.setAttribute("r", 7);
        dot.setAttribute("cx", a.x);
        dot.setAttribute("cy", a.y);
        dot.setAttribute("fill", colors[i]);
        dot.style.filter = "drop-shadow(0 0 9px " + colors[i] + ")";
        net.appendChild(dot);
        dots.push(dot);
      }

      const pulses = centers.map((c, i) => {
        const p = document.createElementNS(SVGNS, "circle");
        p.setAttribute("class", "pulse");
        p.setAttribute("cx", c.x);
        p.setAttribute("cy", c.y);
        p.setAttribute("r", 78);
        p.setAttribute("stroke", colors[i]);
        net.appendChild(p);
        return p;
      });

      // Initial hidden states
      gsap.set(dots, { autoAlpha: 0 });
      gsap.set(pulses, { autoAlpha: 0 });

      const tl = gsap.timeline({ paused: true });

      function pulseAt(i, t) {
        // Animate the radius (not scale) so the ring always expands concentrically
        // around the node — avoids SVG transform-origin ambiguity.
        tl.fromTo(
          pulses[i],
          { attr: { r: 58 }, autoAlpha: 0.5 },
          { attr: { r: 138 }, autoAlpha: 0, duration: 0.7, ease: "power2.out", immediateRender: false },
          t
        );
        tl.to(icons[i], { scale: 1.06, duration: 0.16, ease: "power2.out", transformOrigin: "center center" }, t);
        tl.to(icons[i], { scale: 1, duration: 0.26, ease: "power2.inOut" }, t + 0.16);
      }

      // 1) Tiles pop in one by one (scale 0 -> 1.04 -> 1)
      const popStart = 0.2;
      const popStag = 0.34;
      icons.forEach((ic, i) => {
        const t = popStart + i * popStag;
        tl.fromTo(
          ic,
          { scale: 0, autoAlpha: 0 },
          { scale: 1.04, autoAlpha: 1, duration: 0.34, ease: "power3.out", transformOrigin: "center center" },
          t
        );
        tl.to(ic, { scale: 1, duration: 0.2, ease: "power2.inOut" }, t + 0.34);
      });

      // 2) Connections draw left -> right with a glowing traveling dot; the
      //    target tile pulses when each connection lands.
      const connStart = 2.2;
      const connDur = 0.75;
      const connGap = 0.78;
      pulseAt(0, connStart); // origin node gives a gentle pulse as the first line leaves
      conns.forEach((line, i) => {
        const t = connStart + i * connGap;
        tl.to(line, { strokeDashoffset: 0, duration: connDur, ease: "power1.inOut" }, t);
        tl.set(dots[i], { autoAlpha: 1 }, t);
        tl.fromTo(
          dots[i],
          { attr: { cx: centers[i].x, cy: centers[i].y } },
          { attr: { cx: centers[i + 1].x, cy: centers[i + 1].y }, duration: connDur, ease: "power1.inOut", immediateRender: false },
          t
        );
        tl.to(dots[i], { autoAlpha: 0, duration: 0.25, ease: "power2.out" }, t + connDur - 0.05);
        pulseAt(i + 1, t + connDur - 0.05);
      });

      // 3) Final frame holds: five connected nodes, clean.

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
