<!doctype html>
<html lang="en" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=2160, height=3840" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 2160px; height: 3840px; overflow: hidden;
        font-family: "Inter", system-ui, sans-serif; }

      .stage { position: absolute; inset: 0; overflow: hidden; background: #0a0612; }

      /* ---------- rich animated wallpaper (stays through the unlock) ---------- */
      .wall { position: absolute; inset: 0; overflow: hidden; z-index: 1; }
      .wblob { position: absolute; border-radius: 50%; filter: blur(200px); will-change: transform; }
      .w1 { left: -14%; top: -8%;  width: 1700px; height: 1700px; background: #ff2e88; opacity: 0.9; }
      .w2 { right: -16%; top: 6%;  width: 1800px; height: 1800px; background: #18a8ff; opacity: 0.85; }
      .w3 { left: 8%;  bottom: -6%; width: 1900px; height: 1900px; background: #7c3aed; opacity: 0.9; }
      .w4 { right: -6%; bottom: 12%; width: 1500px; height: 1500px; background: #ffae00; opacity: 0.7; }
      .w5 { left: 30%; top: 36%;  width: 1400px; height: 1400px; background: #00e0a8; opacity: 0.6; }
      /* slow color-shift overlays crossfade to shift the mood over the duration */
      .wtint { position: absolute; inset: 0; mix-blend-mode: soft-light; }
      .wtint.cool { background: radial-gradient(120% 90% at 30% 20%, #2b7bff, transparent 60%),
                                radial-gradient(120% 90% at 80% 90%, #18d0c0, transparent 60%); opacity: 0.7; }
      .wtint.warm { background: radial-gradient(120% 90% at 70% 15%, #ff5e3a, transparent 60%),
                                radial-gradient(120% 90% at 20% 85%, #ff2ec4, transparent 60%); opacity: 0; }
      .wall-dark { position: absolute; inset: 0; background:
        radial-gradient(140% 120% at 50% 40%, transparent 40%, rgba(0,0,0,0.35) 100%); }

      /* ---------- home screen beneath (revealed at unlock) ---------- */
      .homescreen { position: absolute; inset: 0; z-index: 5; opacity: 0;
        padding: 360px 150px 220px; display: flex; flex-direction: column; }
      .app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 90px 110px; }
      .app { width: 100%; aspect-ratio: 1; border-radius: 56px; box-shadow: 0 20px 44px rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.18); }
      .dock { margin-top: auto; height: 380px; border-radius: 80px; padding: 60px; display: flex; gap: 90px;
        background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18);
        backdrop-filter: blur(40px) saturate(160%); -webkit-backdrop-filter: blur(40px) saturate(160%); }
      .dock .app { box-shadow: 0 16px 36px rgba(0,0,0,0.4); }

      /* ---------- lock screen glass layer ---------- */
      .clock-layer { position: absolute; inset: 0; z-index: 30; }
      .lockstack { position: absolute; inset: 0; z-index: 20; }

      /* status bar */
      .statusbar { position: absolute; top: 0; left: 0; right: 0; height: 96px; z-index: 40;
        display: flex; align-items: center; justify-content: space-between; padding: 0 72px;
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(30px) saturate(140%); -webkit-backdrop-filter: blur(30px) saturate(140%);
        box-shadow: inset 0 -1.5px 0 rgba(255,255,255,0.22); }
      .sb-time { color: #fff; font-size: 46px; font-weight: 700; letter-spacing: 0.5px; }
      .sb-icons { display: flex; align-items: center; gap: 18px; }
      .sb-icons svg { height: 40px; }

      /* big clock */
      .clock { position: absolute; top: 720px; left: 0; right: 0; text-align: center; }
      .clock .time { font-size: 470px; font-weight: 800; color: #fff; line-height: 0.92; letter-spacing: -10px;
        text-shadow: 0 12px 50px rgba(0,0,0,0.35); }
      .clock .time .d { display: inline-block; }
      .clock .date { margin-top: 26px; font-size: 60px; font-weight: 500; color: rgba(255,255,255,0.72);
        letter-spacing: 1px; }

      /* notifications (tucked perspective stack) */
      .notif { position: absolute; left: 150px; width: 1860px; height: 300px; border-radius: 52px; overflow: hidden;
        padding: 46px 50px; display: flex; align-items: center; gap: 44px;
        background: rgba(255,255,255,0.13);
        backdrop-filter: blur(40px) saturate(160%) brightness(1.04); -webkit-backdrop-filter: blur(40px) saturate(160%) brightness(1.04);
        border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 30px 70px rgba(0,0,0,0.4); }
      .notif .n-rim { position: absolute; inset: 0; border-radius: 52px; pointer-events: none;
        box-shadow: inset 0 3px 0 rgba(255,255,255,0.4), inset 0 0 0 1px rgba(255,255,255,0.10); }
      .n-icon { width: 150px; height: 150px; flex: none; border-radius: 38px; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 12px 28px rgba(0,0,0,0.35); position: relative; z-index: 1; }
      .n-icon svg { width: 84px; height: 84px; }
      .n-body { flex: 1; position: relative; z-index: 1; min-width: 0; }
      .n-top { display: flex; justify-content: space-between; align-items: baseline; }
      .n-app { color: rgba(255,255,255,0.96); font-size: 42px; font-weight: 700; letter-spacing: 0.4px; }
      .n-when { color: rgba(255,255,255,0.6); font-size: 36px; font-weight: 500; }
      .n-title { color: #fff; font-size: 44px; font-weight: 600; margin-top: 6px; }
      .n-msg { color: rgba(255,255,255,0.82); font-size: 40px; font-weight: 400; margin-top: 8px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* bottom controls + home indicator */
      .ctl { position: absolute; width: 168px; height: 168px; border-radius: 50%; z-index: 40;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.14);
        backdrop-filter: blur(34px) saturate(150%); -webkit-backdrop-filter: blur(34px) saturate(150%);
        border: 1px solid rgba(255,255,255,0.20); box-shadow: 0 22px 50px rgba(0,0,0,0.4); }
      .ctl svg { width: 80px; height: 80px; }
      .ctl.cam { left: 270px; top: 3320px; }
      .ctl.flash { right: 270px; top: 3320px; }
      .home-ind { position: absolute; left: 50%; transform: translateX(-50%); top: 3712px;
        width: 480px; height: 20px; border-radius: 999px; z-index: 40;
        background: rgba(255,255,255,0.5); box-shadow: 0 0 18px rgba(255,255,255,0.25); }

      /* swipe touch indicator */
      .touch { position: absolute; left: 50%; top: 3560px; width: 150px; height: 150px; border-radius: 50%; z-index: 50;
        transform: translate(-50%,-50%); opacity: 0;
        background: radial-gradient(circle, rgba(255,255,255,0.55), rgba(255,255,255,0.05) 60%, transparent 72%); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="20" data-width="2160" data-height="3840">
      <div class="stage" data-layout-allow-overflow>

        <!-- wallpaper -->
        <div class="wall" id="wall" data-layout-ignore>
          <div class="wblob w1" id="wb1"></div>
          <div class="wblob w2" id="wb2"></div>
          <div class="wblob w3" id="wb3"></div>
          <div class="wblob w4" id="wb4"></div>
          <div class="wblob w5" id="wb5"></div>
          <div class="wtint cool" id="tcool"></div>
          <div class="wtint warm" id="twarm"></div>
          <div class="wall-dark"></div>
        </div>

        <!-- home screen beneath -->
        <div class="homescreen" id="homescreen" data-layout-ignore>
          <div class="app-grid">
            <div class="app" style="background:linear-gradient(135deg,#ff5e7e,#ff2e88)"></div>
            <div class="app" style="background:linear-gradient(135deg,#5ad1ff,#18a8ff)"></div>
            <div class="app" style="background:linear-gradient(135deg,#ffb34d,#ff7a3d)"></div>
            <div class="app" style="background:linear-gradient(135deg,#9b6dff,#7c3aed)"></div>
            <div class="app" style="background:linear-gradient(135deg,#3ddc97,#00b87c)"></div>
            <div class="app" style="background:linear-gradient(135deg,#ff7a3d,#ff5e3a)"></div>
            <div class="app" style="background:linear-gradient(135deg,#5b8cff,#2b5cff)"></div>
            <div class="app" style="background:linear-gradient(135deg,#ff5ec4,#d6359b)"></div>
            <div class="app" style="background:linear-gradient(135deg,#46e0c0,#18a8ff)"></div>
            <div class="app" style="background:linear-gradient(135deg,#ffd23f,#ffae00)"></div>
            <div class="app" style="background:linear-gradient(135deg,#a06bff,#6d3aed)"></div>
            <div class="app" style="background:linear-gradient(135deg,#4dd0ff,#2b7bff)"></div>
            <div class="app" style="background:linear-gradient(135deg,#ff6b6b,#ff2e88)"></div>
            <div class="app" style="background:linear-gradient(135deg,#7c5cff,#5b3aed)"></div>
            <div class="app" style="background:linear-gradient(135deg,#34d399,#00b87c)"></div>
            <div class="app" style="background:linear-gradient(135deg,#fb923c,#ff7a3d)"></div>
            <div class="app" style="background:linear-gradient(135deg,#60a5fa,#2b7bff)"></div>
            <div class="app" style="background:linear-gradient(135deg,#f472b6,#d6359b)"></div>
            <div class="app" style="background:linear-gradient(135deg,#22d3ee,#18a8ff)"></div>
            <div class="app" style="background:linear-gradient(135deg,#fbbf24,#ffae00)"></div>
          </div>
          <div class="dock">
            <div class="app" style="background:linear-gradient(135deg,#5b8cff,#2b5cff)"></div>
            <div class="app" style="background:linear-gradient(135deg,#3ddc97,#00b87c)"></div>
            <div class="app" style="background:linear-gradient(135deg,#ff5e7e,#ff2e88)"></div>
            <div class="app" style="background:linear-gradient(135deg,#ffb34d,#ff7a3d)"></div>
          </div>
        </div>

        <!-- big clock (exits last) -->
        <div class="clock-layer" data-layout-allow-overflow>
          <div class="clock" id="clock" data-layout-allow-overflow>
            <div class="time"><span class="d" id="d0">9</span><span class="d" id="d1">:</span><span class="d" id="d2">4</span><span class="d" id="d3">1</span></div>
            <div class="date" id="date">Monday, June 7</div>
          </div>
        </div>

        <!-- lock screen glass that lifts away as one surface -->
        <div class="lockstack" id="lockstack" data-layout-allow-overflow>
          <div class="statusbar" id="statusbar">
            <div class="sb-time">9:41</div>
            <div class="sb-icons">
              <svg viewBox="0 0 24 16" fill="#fff"><rect x="0" y="9" width="4" height="6" rx="1"/><rect x="6" y="6" width="4" height="9" rx="1"/><rect x="12" y="3" width="4" height="12" rx="1"/><rect x="18" y="0" width="4" height="15" rx="1"/></svg>
              <svg viewBox="0 0 24 18" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M2 7 A14 14 0 0 1 22 7"/><path d="M6 11 A8 8 0 0 1 18 11"/><path d="M10 15 A3 3 0 0 1 14 15"/></svg>
              <svg viewBox="0 0 28 16" fill="none"><rect x="1" y="2" width="22" height="12" rx="3.5" stroke="#fff" stroke-width="1.6" opacity="0.6"/><rect x="3" y="4" width="16" height="8" rx="1.6" fill="#fff"/><rect x="24.5" y="6" width="2.2" height="4" rx="1.1" fill="#fff" opacity="0.6"/></svg>
            </div>
          </div>

          <!-- notifications (tucked perspective stack) -->
          <div class="notif" id="n2" style="top:2470px; z-index:21;">
            <div class="n-rim"></div>
            <div class="n-icon" style="background:linear-gradient(135deg,#34d399,#00b87c)"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7 H20 V19 H4 Z"/><path d="M4 8 L12 14 L20 8"/></svg></div>
            <div class="n-body"><div class="n-top"><span class="n-app">Mail</span><span class="n-when">8:32 AM</span></div><div class="n-title">Weekly digest ready</div><div class="n-msg">Your Monday summary across 4 projects is in.</div></div>
          </div>
          <div class="notif" id="n1" style="top:2330px; z-index:22;">
            <div class="n-rim"></div>
            <div class="n-icon" style="background:linear-gradient(135deg,#5b8cff,#2b5cff)"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9 A6 6 0 0 1 18 9 V14 L20 17 H4 L6 14 Z"/><path d="M10 17 A2 2 0 0 0 14 17"/></svg></div>
            <div class="n-body"><div class="n-top"><span class="n-app">Calendar</span><span class="n-when">now</span></div><div class="n-title">Standup in 15 minutes</div><div class="n-msg">Design sync · Glass team · Room 4.</div></div>
          </div>
          <div class="notif" id="n0" style="top:2180px; z-index:23;">
            <div class="n-rim"></div>
            <div class="n-icon" style="background:linear-gradient(135deg,#3ddc97,#00b87c)"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18 V7 A2 2 0 0 1 6 5 H18 A2 2 0 0 1 20 7 V15 A2 2 0 0 1 18 17 H8 Z"/></svg></div>
            <div class="n-body"><div class="n-top"><span class="n-app">Messages</span><span class="n-when">now</span></div><div class="n-title">Avery</div><div class="n-msg">The glass build looks unreal — shipping it 🎉</div></div>
          </div>

          <!-- bottom controls -->
          <div class="ctl cam" id="cam"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8 H7 L9 5 H15 L17 8 H21 V19 H3 Z"/><circle cx="12" cy="13" r="3.6"/></svg></div>
          <div class="ctl flash" id="flash"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3 H15 L14 11 H18 L10 22 L11 13 H7 Z"/></svg></div>

          <div class="home-ind" id="homeind"></div>
        </div>

        <!-- swipe affordance -->
        <div class="touch" id="touch" data-layout-ignore></div>

      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const FPS = 30;
      const f = (n) => n / FPS;

      // ---------- initial states ----------
      gsap.set("#statusbar", { autoAlpha: 0, y: -40 });
      gsap.set(".clock .d", { autoAlpha: 0, scale: 0.4, transformOrigin: "50% 60%" });
      gsap.set("#date", { autoAlpha: 0, y: 24 });
      // notifications tucked: each rests at a slight perspective scale
      gsap.set("#n0", { autoAlpha: 0, y: 120, scale: 1.0,  transformOrigin: "50% 50%" });
      gsap.set("#n1", { autoAlpha: 0, y: 120, scale: 0.965, transformOrigin: "50% 50%" });
      gsap.set("#n2", { autoAlpha: 0, y: 120, scale: 0.93, transformOrigin: "50% 50%" });
      gsap.set("#cam, #flash", { autoAlpha: 0, scale: 0.5, transformOrigin: "50% 50%" });
      gsap.set("#homeind", { autoAlpha: 0, scaleX: 0.4, transformOrigin: "50% 50%" });
      gsap.set("#touch", { autoAlpha: 0, top: 3600 });
      gsap.set("#homescreen", { autoAlpha: 0, scale: 1.06, transformOrigin: "50% 46%" });
      gsap.set(".app-grid .app", { autoAlpha: 0 });
      gsap.set(".dock", { autoAlpha: 0 });

      const tl = gsap.timeline({ paused: true });

      // ---------- wallpaper: drift + slow color shift over 20s ----------
      const wd = [["#wb1",60,40],["#wb2",-70,30],["#wb3",50,-40],["#wb4",-44,-50],["#wb5",36,46]];
      wd.forEach(([s,dx,dy]) => tl.fromTo(s,{x:-dx*0.5,y:-dy*0.5},{x:dx*0.5,y:dy*0.5,duration:20,ease:"sine.inOut"},0));
      // cool -> warm -> cool crossfade
      tl.to("#tcool", { opacity: 0.1, duration: 10, ease: "sine.inOut" }, 0);
      tl.to("#twarm", { opacity: 0.65, duration: 10, ease: "sine.inOut" }, 0);
      tl.to("#tcool", { opacity: 0.7, duration: 10, ease: "sine.inOut" }, 10);
      tl.to("#twarm", { opacity: 0.0, duration: 10, ease: "sine.inOut" }, 10);

      // ---------- assemble top to bottom ----------
      // status bar
      tl.to("#statusbar", { autoAlpha: 1, y: 0, duration: f(10), ease: "power2.out" }, 0.5);

      // clock digits scale in fast, each slightly staggered
      tl.to("#d0", { autoAlpha: 1, scale: 1, duration: f(6), ease: "back.out(2.4)" }, 1.1);
      tl.to("#d1", { autoAlpha: 1, scale: 1, duration: f(6), ease: "back.out(2.4)" }, 1.18);
      tl.to("#d2", { autoAlpha: 1, scale: 1, duration: f(6), ease: "back.out(2.4)" }, 1.26);
      tl.to("#d3", { autoAlpha: 1, scale: 1, duration: f(6), ease: "back.out(2.4)" }, 1.34);
      tl.to("#date", { autoAlpha: 1, y: 0, duration: f(10), ease: "power2.out" }, 1.7);

      // notifications appear one, two, three -> settle into tucked stack
      tl.to("#n0", { autoAlpha: 1, y: 0, duration: f(11), ease: "back.out(1.5)" }, 2.4);
      tl.to("#n1", { autoAlpha: 0.92, y: 0, duration: f(11), ease: "back.out(1.5)" }, 2.9);
      tl.to("#n2", { autoAlpha: 0.82, y: 0, duration: f(11), ease: "back.out(1.5)" }, 3.4);

      // bottom controls + home indicator
      tl.to("#cam",   { autoAlpha: 1, scale: 1, duration: f(9), ease: "back.out(2.2)" }, 4.0);
      tl.to("#flash", { autoAlpha: 1, scale: 1, duration: f(9), ease: "back.out(2.2)" }, 4.12);
      tl.to("#homeind", { autoAlpha: 0.9, scaleX: 1, duration: f(10), ease: "power2.out" }, 4.3);

      // ---------- gentle life during the hold ----------
      tl.to("#clock", { scale: 1.012, duration: 4.5, ease: "sine.inOut", repeat: 1, yoyo: true, transformOrigin: "50% 50%" }, 5.0);

      // ---------- swipe up to unlock ----------
      const swipe = 13.8;
      // touch indicator rises from the home bar
      tl.to("#touch", { autoAlpha: 0.9, duration: f(5), ease: "power2.out" }, swipe);
      tl.to("#touch", { top: 2700, duration: 0.6, ease: "power2.in" }, swipe);
      tl.to("#touch", { autoAlpha: 0, duration: f(8), ease: "power2.in" }, swipe + 0.5);
      // home indicator brightens and stretches as the pull begins
      tl.to("#homeind", { width: 560, autoAlpha: 1, duration: f(8), ease: "power2.out" }, swipe);

      // lock surface lifts away as one (status bar, notifications, controls, home bar)
      const lift = swipe + 0.45;
      tl.to("#lockstack", { y: -4300, duration: 0.62, ease: "power2.in" }, lift);
      // home screen revealed beneath
      tl.to("#homescreen", { autoAlpha: 1, scale: 1, duration: 0.85, ease: "power2.out" }, lift + 0.05);

      // the big clock is the heaviest — it trails and exits LAST
      tl.to("#clock", { y: -1620, duration: 0.9, ease: "power2.in" }, lift + 0.12);

      // ---------- home screen settles, calm tail to 20s ----------
      tl.fromTo(".app-grid .app", { autoAlpha: 0, scale: 0.7, y: 30 },
        { autoAlpha: 1, scale: 1, y: 0, duration: f(9), ease: "back.out(1.8)", stagger: f(1.5) }, lift + 0.2);
      tl.fromTo(".dock", { autoAlpha: 0, y: 80 }, { autoAlpha: 1, y: 0, duration: f(12), ease: "power3.out" }, lift + 0.35);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
