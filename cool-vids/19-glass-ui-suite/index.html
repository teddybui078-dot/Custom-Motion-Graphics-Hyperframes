<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=3840, height=2160" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 3840px; height: 2160px; overflow: hidden;
        font-family: "Inter", sans-serif; }

      .stage { position: absolute; inset: 0; overflow: hidden; background: #050509; }
      .grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.05; mix-blend-mode: overlay; z-index: 60;
        background-image: radial-gradient(rgba(255,255,255,0.7) 1px, transparent 1px); background-size: 4px 4px; }
      .scene { position: absolute; inset: 0; transform-origin: 50% 50%; }

      /* ===================== SCENE 1 — GLASS MUSIC PLAYER ===================== */
      #scene1 { z-index: 1; background: radial-gradient(120% 120% at 50% 50%, #14132b 0%, #0c0b1c 52%, #050509 100%); }

      #bloom { position: absolute; left: 50%; top: 50%; width: 2000px; height: 2000px; margin: -1000px 0 0 -1000px;
        border-radius: 50%; filter: blur(220px); background: #3b82f6; opacity: 0.55; will-change: transform, background-color; }

      #card { position: absolute; left: 50%; top: 50%; width: 720px; height: 1010px;
        margin: -505px 0 0 -360px; border-radius: 62px; overflow: hidden;
        display: flex; flex-direction: column; padding: 48px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(72px) saturate(150%); -webkit-backdrop-filter: blur(72px) saturate(150%);
        box-shadow:
          inset 0 5px 0 rgba(255,255,255,0.50),
          inset 1.5px 0 0 rgba(255,255,255,0.16),
          inset -1.5px 0 0 rgba(255,255,255,0.16),
          inset 0 -1.5px 0 rgba(255,255,255,0.14),
          0 80px 160px rgba(4,4,12,0.6), 0 14px 44px rgba(4,4,12,0.45); }
      .card-tint { position: absolute; inset: 0; border-radius: 62px; pointer-events: none;
        background: #3b82f6; opacity: 0.16; mix-blend-mode: screen; will-change: background-color; }
      .card-border { position: absolute; inset: 0; border-radius: 62px; pointer-events: none;
        border: 1px solid rgba(255,255,255,0.14); }
      .card-content { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100%;
        justify-content: space-between; }
      .artwork { position: relative; width: 100%; height: 470px; flex: none; border-radius: 40px; overflow: hidden;
        backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
        background: linear-gradient(150deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02));
        box-shadow: inset 0 3px 0 rgba(255,255,255,0.35), inset 0 -2px 6px rgba(0,0,0,0.22), 0 18px 40px rgba(4,4,12,0.4); }
      .artwork::after { content: ""; position: absolute; left: 0; top: 0; right: 0; height: 46%;
        background: linear-gradient(to bottom, rgba(255,255,255,0.28), transparent); }
      .art-glyph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0.9; }
      .art-glyph svg { width: 150px; height: 150px; stroke: rgba(255,255,255,0.85); fill: none;
        stroke-width: 6; stroke-linecap: round; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.35)); }
      .meta { margin-top: 40px; }
      .title { font-size: 56px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px; line-height: 1.05; }
      .title .w { display: inline-block; margin-right: 0.28em; }
      .artist { margin-top: 14px; font-size: 36px; font-weight: 400; color: rgba(255,255,255,0.72); }
      .progress { margin-top: 36px; }
      .track { position: relative; width: 100%; height: 12px; border-radius: 999px; overflow: hidden;
        background: rgba(255,255,255,0.14); box-shadow: inset 0 1px 2px rgba(0,0,0,0.3); }
      .fill { position: absolute; left: 0; top: 0; height: 100%; width: 100%; border-radius: 999px;
        transform-origin: 0 50%; transform: scaleX(0);
        background: linear-gradient(90deg, rgba(255,255,255,0.7), #ffffff); }
      .playhead { position: absolute; top: 50%; left: 0; width: 30px; height: 30px; margin-top: -15px; border-radius: 50%;
        background: #ffffff; box-shadow: 0 0 18px rgba(255,255,255,0.6), 0 4px 10px rgba(0,0,0,0.35); }
      .times { display: flex; justify-content: space-between; margin-top: 18px;
        font-size: 28px; color: rgba(255,255,255,0.66); font-variant-numeric: tabular-nums; }
      .controls { display: flex; align-items: center; justify-content: center; gap: 64px; margin-top: 36px; }
      .ctrl { position: relative; border-radius: 50%; flex: none; display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.10);
        backdrop-filter: blur(24px) saturate(150%); -webkit-backdrop-filter: blur(24px) saturate(150%);
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.45), inset 0 -2px 6px rgba(0,0,0,0.20), 0 12px 26px rgba(4,4,12,0.4); }
      .ctrl.side { width: 112px; height: 112px; }
      .ctrl.play { width: 132px; height: 132px; background: rgba(255,255,255,0.16); }
      .ctrl svg { stroke: rgba(255,255,255,0.95); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .ctrl.side svg { width: 50px; height: 50px; }
      .ctrl.play svg { width: 60px; height: 60px; fill: rgba(255,255,255,0.96); stroke: none; }
      .ctrl .flash { position: absolute; inset: 0; border-radius: 50%; opacity: 0; pointer-events: none;
        background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.8), transparent 70%); }

      /* ===================== SCENE 2 — GLASS ONBOARDING MODAL ===================== */
      #scene2 { z-index: 2; }
      /* blurred product interface behind a dark overlay */
      #ob-bg { position: absolute; inset: 0; background: #eef1f6; filter: blur(8px); overflow: hidden; will-change: filter; }
      .ob-topbar { position: absolute; left: 0; right: 0; top: 0; height: 150px; background: #ffffff;
        box-shadow: 0 2px 0 rgba(0,0,0,0.05); }
      .ob-dot { position: absolute; top: 56px; width: 38px; height: 38px; border-radius: 50%; }
      .ob-side { position: absolute; left: 0; top: 150px; bottom: 0; width: 520px; background: #f6f8fb; }
      .ob-side .row { position: absolute; left: 60px; width: 380px; height: 56px; border-radius: 16px; background: #e3e8f0; }
      .ob-card { position: absolute; border-radius: 36px; background: #ffffff; box-shadow: 0 30px 60px rgba(40,50,80,0.12); }
      .ob-card .hd { position: absolute; left: 0; right: 0; top: 0; height: 220px; border-radius: 36px 36px 0 0; }
      .ob-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.55; will-change: transform; }
      #ob-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }

      #ob-modal { position: absolute; left: 50%; top: 50%; width: 1240px; height: 1360px; margin: -680px 0 0 -620px;
        border-radius: 62px; overflow: hidden; display: flex; flex-direction: column; padding: 84px;
        background: rgba(255,255,255,0.14);
        backdrop-filter: blur(80px) saturate(150%); -webkit-backdrop-filter: blur(80px) saturate(150%);
        box-shadow:
          inset 0 6px 0 rgba(255,255,255,0.55),
          inset 2px 0 0 rgba(255,255,255,0.25), inset -2px 0 0 rgba(255,255,255,0.25),
          inset 0 -2px 0 rgba(255,255,255,0.25),
          0 100px 200px rgba(4,4,12,0.55), 0 20px 60px rgba(4,4,12,0.4); }
      .modal-border { position: absolute; inset: 0; border-radius: 62px; pointer-events: none;
        border: 1px solid rgba(255,255,255,0.18); }
      .ob-stack { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center;
        height: 100%; justify-content: space-between; }

      .ob-icon { width: 168px; height: 168px; border-radius: 50%; flex: none; display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.16);
        backdrop-filter: blur(20px) saturate(160%); -webkit-backdrop-filter: blur(20px) saturate(160%);
        box-shadow: inset 0 3px 0 rgba(255,255,255,0.6), inset 0 -2px 8px rgba(0,0,0,0.2), 0 18px 40px rgba(4,4,12,0.4); }
      .ob-icon svg { width: 86px; height: 86px; stroke: #ffffff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .ob-headline { margin-top: 40px; font-size: 78px; font-weight: 700; color: #ffffff; letter-spacing: -1px; text-align: center; line-height: 1.04; }
      .ob-headline .w { display: inline-block; margin-right: 0.26em; }
      .ob-desc { margin-top: 26px; font-size: 35px; font-weight: 400; line-height: 1.4; text-align: center;
        color: rgba(255,255,255,0.82); max-width: 900px; }

      .ob-features { width: 100%; margin-top: 40px; display: flex; flex-direction: column; gap: 26px; }
      .ob-row { display: flex; align-items: center; gap: 32px; padding: 30px 34px; border-radius: 30px;
        background: rgba(255,255,255,0.07);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -1px 0 rgba(0,0,0,0.12); }
      .ob-row .ri { width: 90px; height: 90px; border-radius: 24px; flex: none; display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.12); box-shadow: inset 0 2px 0 rgba(255,255,255,0.4); }
      .ob-row .ri svg { width: 46px; height: 46px; stroke: #ffffff; fill: none; stroke-width: 2.1; stroke-linecap: round; stroke-linejoin: round; }
      .ob-row .rt { display: flex; flex-direction: column; gap: 6px; }
      .ob-row .l1 { font-size: 38px; font-weight: 600; color: #ffffff; }
      .ob-row .l2 { font-size: 28px; font-weight: 400; color: rgba(255,255,255,0.68); }

      .ob-buttons { width: 100%; margin-top: 44px; display: flex; gap: 32px; }
      .ob-btn { flex: 1; height: 128px; border-radius: 32px; display: flex; align-items: center; justify-content: center;
        font-size: 40px; font-weight: 600; color: #ffffff; position: relative; overflow: hidden;
        backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.45), 0 14px 30px rgba(4,4,12,0.35); }
      .ob-btn.secondary { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.86); }
      .ob-btn.primary { background: rgba(59,130,246,0.20); }
      .ob-btn.primary .pflash { position: absolute; inset: 0; opacity: 0; pointer-events: none;
        background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.7), transparent 70%); }

      #cursor { position: absolute; left: 0; top: 0; z-index: 90; opacity: 0;
        filter: drop-shadow(0 12px 16px rgba(0,0,0,0.55)); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="38" data-width="3840" data-height="2160">
      <div class="stage" data-layout-allow-overflow>

        <!-- ===== SCENE 1: Glass Music Player ===== -->
        <div class="scene" id="scene1" data-layout-allow-overflow>
          <div id="bloom"></div>
          <div id="card">
            <div class="card-tint"></div>
            <div class="card-content">
              <div>
                <div class="artwork">
                  <div class="art-glyph">
                    <svg viewBox="0 0 24 24"><path d="M4 14v-3M8 16V8M12 18V6M16 16V8M20 14v-3"/></svg>
                  </div>
                </div>
                <div class="meta">
                  <div class="title" id="title"></div>
                  <div class="artist" id="artist">Aerials</div>
                </div>
                <div class="progress">
                  <div class="track">
                    <div class="fill" id="fill"></div>
                    <div class="playhead" id="playhead"></div>
                  </div>
                  <div class="times">
                    <span id="t-cur">0:00</span>
                    <span id="t-rem">-3:45</span>
                  </div>
                </div>
              </div>
              <div class="controls">
                <div class="ctrl side" id="c-prev">
                  <svg viewBox="0 0 24 24"><path d="M7 6v12"/><path d="M20 6l-10 6 10 6z" fill="rgba(255,255,255,0.95)" stroke="none"/></svg>
                </div>
                <div class="ctrl play" id="c-play">
                  <div class="flash"></div>
                  <svg viewBox="0 0 24 24"><path d="M8 5l12 7-12 7z"/></svg>
                </div>
                <div class="ctrl side" id="c-next">
                  <svg viewBox="0 0 24 24"><path d="M17 6v12"/><path d="M4 6l10 6-10 6z" fill="rgba(255,255,255,0.95)" stroke="none"/></svg>
                </div>
              </div>
            </div>
            <div class="card-border"></div>
          </div>
        </div>

        <!-- ===== SCENE 2: Glass Onboarding Modal ===== -->
        <div class="scene" id="scene2" data-layout-allow-overflow>
          <div id="ob-bg">
            <div class="ob-blob" id="obl-1" style="left:160px; top:380px; width:760px; height:760px; background:#a78bfa;"></div>
            <div class="ob-blob" id="obl-2" style="right:120px; top:260px; width:700px; height:700px; background:#38bdf8;"></div>
            <div class="ob-blob" id="obl-3" style="right:520px; bottom:120px; width:680px; height:680px; background:#34d399;"></div>
            <div class="ob-topbar">
              <div class="ob-dot" style="left:60px;  background:#ff5f57;"></div>
              <div class="ob-dot" style="left:120px; background:#febc2e;"></div>
              <div class="ob-dot" style="left:180px; background:#28c840;"></div>
            </div>
            <div class="ob-side">
              <div class="row" style="top:230px;"></div>
              <div class="row" style="top:320px;"></div>
              <div class="row" style="top:410px;"></div>
              <div class="row" style="top:500px;"></div>
            </div>
            <div class="ob-card" style="left:620px; top:250px; width:980px; height:760px;">
              <div class="hd" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);"></div>
            </div>
            <div class="ob-card" style="left:1660px; top:250px; width:980px; height:760px;">
              <div class="hd" style="background:linear-gradient(135deg,#06b6d4,#3b82f6);"></div>
            </div>
            <div class="ob-card" style="left:620px; top:1100px; width:2020px; height:760px;">
              <div class="hd" style="background:linear-gradient(135deg,#10b981,#22d3ee);"></div>
            </div>
          </div>
          <div id="ob-overlay"></div>

          <div id="ob-modal">
            <div class="ob-stack">
              <div class="ob-icon">
                <svg viewBox="0 0 24 24"><path d="M12 3l2.2 5.5L20 10l-4.4 3.4L17 19l-5-3-5 3 1.4-5.6L4 10l5.8-1.5z"/></svg>
              </div>
              <div class="ob-headline" id="ob-headline"></div>
              <div class="ob-desc" id="ob-desc">Everything you need to design, animate, and ship — in one calm, focused space.</div>
              <div class="ob-features">
                <div class="ob-row">
                  <div class="ri"><svg viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg></div>
                  <div class="rt"><div class="l1">Lightning fast</div><div class="l2">Renders in milliseconds, not minutes.</div></div>
                </div>
                <div class="ob-row">
                  <div class="ri"><svg viewBox="0 0 24 24"><path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/></svg></div>
                  <div class="rt"><div class="l1">Private by default</div><div class="l2">Your work stays yours, always.</div></div>
                </div>
                <div class="ob-row">
                  <div class="ri"><svg viewBox="0 0 24 24"><path d="M12 4v4M12 16v4M4 12h4M16 12h4M6.3 6.3l2.8 2.8M14.9 14.9l2.8 2.8M17.7 6.3l-2.8 2.8M9.1 14.9l-2.8 2.8"/></svg></div>
                  <div class="rt"><div class="l1">Smart suggestions</div><div class="l2">AI that anticipates your next move.</div></div>
                </div>
              </div>
              <div class="ob-buttons">
                <div class="ob-btn secondary" id="ob-secondary">Maybe later</div>
                <div class="ob-btn primary" id="ob-primary"><div class="pflash"></div>Get started</div>
              </div>
            </div>
            <div class="modal-border"></div>
          </div>
        </div>

        <div id="cursor">
          <svg width="82" height="96" viewBox="0 0 24 28">
            <path d="M3,2 L3,22 L8.5,16.8 L12,24.5 L15.4,23 L11.9,15.3 L19,15.3 Z"
                  fill="#ffffff" stroke="#1b1b22" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="grain"></div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const $ = (s) => document.querySelector(s);
      const FPS = 30;
      const f = (n) => n / FPS;

      // ----- scene 1: word-by-word title -----
      const TITLE = ["Slow", "Motion", "Lights"];
      const titleEl = $("#title");
      TITLE.forEach((w) => { const s = document.createElement("span"); s.className = "w"; s.textContent = w; titleEl.appendChild(s); });
      const words = titleEl.querySelectorAll(".w");

      // ----- scene 1: progress model -----
      const TRACK_W = 720 - 96, PLAY_W = 30, TOTAL = 225;
      const fmt = (s) => { const m = Math.floor(s / 60); const ss = Math.floor(s % 60); return m + ":" + String(ss).padStart(2, "0"); };
      const curEl = $("#t-cur"), remEl = $("#t-rem"), fillEl = $("#fill"), headEl = $("#playhead");
      const prog = { v: 0 };
      const renderProgress = () => {
        const p = prog.v;
        curEl.textContent = fmt(p * TOTAL);
        remEl.textContent = "-" + fmt(TOTAL - p * TOTAL);
        gsap.set(fillEl, { scaleX: p, opacity: 0.55 + 0.45 * p });
        gsap.set(headEl, { x: p * (TRACK_W - PLAY_W) });
      };
      renderProgress();

      // ----- scene 2: word-by-word headline -----
      const HEAD = ["Welcome", "to", "Lumen"];
      const headlineEl = $("#ob-headline");
      HEAD.forEach((w) => { const s = document.createElement("span"); s.className = "w"; s.textContent = w; headlineEl.appendChild(s); });
      const headWords = headlineEl.querySelectorAll(".w");
      const obRows = gsap.utils.toArray("#scene2 .ob-row");

      const BLUE = "#3b82f6", PURPLE = "#7c3aed", TEAL = "#14b8a6";

      // ----- initial states -----
      gsap.set("#card", { scale: 0.9, y: 34, autoAlpha: 0, transformOrigin: "50% 50%" });
      gsap.set(".artwork", { autoAlpha: 0, scale: 0.96, transformOrigin: "50% 50%" });
      gsap.set(words, { autoAlpha: 0, y: 16 });
      gsap.set("#artist", { autoAlpha: 0, y: 12 });
      gsap.set(".progress", { autoAlpha: 0 });
      gsap.set(["#c-prev", "#c-play", "#c-next"], { autoAlpha: 0, scale: 0, transformOrigin: "50% 50%" });
      gsap.set("#cursor", { autoAlpha: 0, x: 2480, y: 1760 });
      // scene 2 hidden until the transition
      gsap.set("#scene2", { autoAlpha: 0 });
      gsap.set("#ob-modal", { scale: 0.88, y: 40, autoAlpha: 0, transformOrigin: "50% 50%" });
      gsap.set(".ob-icon", { scale: 0, autoAlpha: 0, transformOrigin: "50% 50%" });
      gsap.set(headWords, { autoAlpha: 0, y: 18 });
      gsap.set("#ob-desc", { autoAlpha: 0, y: 14 });
      gsap.set(obRows, { autoAlpha: 0, y: 22, scale: 0.98, transformOrigin: "50% 50%" });
      gsap.set(["#ob-secondary", "#ob-primary"], { autoAlpha: 0, y: 16 });

      // ===================== TIMELINE =====================
      const tl = gsap.timeline({ paused: true });

      /* ---------- SCENE 1 (0 – 17s) ---------- */
      tl.fromTo("#bloom", { x: -60, y: -30 }, { x: 70, y: 40, duration: 18, ease: "sine.inOut" }, 0);
      tl.to("#bloom", { backgroundColor: PURPLE, duration: 9, ease: "sine.inOut" }, 0);
      tl.to("#bloom", { backgroundColor: TEAL, duration: 9, ease: "sine.inOut" }, 9);
      tl.to(".card-tint", { backgroundColor: PURPLE, duration: 9, ease: "sine.inOut" }, 0);
      tl.to(".card-tint", { backgroundColor: TEAL, duration: 9, ease: "sine.inOut" }, 9);

      tl.to("#card", { scale: 1.0, y: 0, autoAlpha: 1, duration: 0.7, ease: "back.out(1.6)" }, 0.3);
      tl.to(".artwork", { autoAlpha: 1, scale: 1, duration: 0.6, ease: "power3.out" }, 0.7);
      tl.to(words, { autoAlpha: 1, y: 0, duration: 0.45, ease: "power2.out", stagger: 0.16 }, 1.25);
      tl.to("#artist", { autoAlpha: 1, y: 0, duration: 0.5, ease: "power2.out" }, 1.95);
      tl.to(".progress", { autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 2.35);
      tl.to("#c-prev", { autoAlpha: 1, scale: 1, duration: 0.4, ease: "back.out(2.2)" }, 2.6);
      tl.to("#c-play", { autoAlpha: 1, scale: 1, duration: 0.45, ease: "back.out(2.2)" }, 2.74);
      tl.to("#c-next", { autoAlpha: 1, scale: 1, duration: 0.4, ease: "back.out(2.2)" }, 2.88);
      tl.to(prog, { v: 1, duration: 13, ease: "none", onUpdate: renderProgress }, 3.2);

      tl.to("#cursor", { autoAlpha: 1, duration: 0.3 }, 4.4);
      tl.to("#cursor", { x: 1920 + 6, y: 1290, duration: 1.0, ease: "power2.inOut" }, 4.5);
      const tap = 5.7;
      tl.to("#c-play .flash", { autoAlpha: 1, duration: f(2) }, tap);
      tl.to("#c-play .flash", { autoAlpha: 0, duration: 0.18 }, tap + f(2));
      tl.to("#c-play", { scale: 0.88, duration: 0.10, ease: "power2.in" }, tap);
      tl.to("#c-play", { scale: 1.0, duration: 0.42, ease: "elastic.out(1, 0.5)" }, tap + 0.10);
      tl.to("#cursor", { y: 1276, duration: 0.12, ease: "power2.in", yoyo: true, repeat: 1 }, tap);
      tl.to("#cursor", { x: 2360, y: 1700, autoAlpha: 0, duration: 1.0, ease: "power2.in" }, tap + 0.9);

      /* ---------- TRANSITION: blur crossfade (premium / calm, 0.8s) ---------- */
      const TR = 17.2;
      tl.fromTo("#scene1", { filter: "blur(0px)" }, { autoAlpha: 0, filter: "blur(26px)", duration: 0.8, ease: "sine.inOut" }, TR);
      tl.fromTo("#scene2", { autoAlpha: 0, filter: "blur(26px)" }, { autoAlpha: 1, filter: "blur(0px)", duration: 0.8, ease: "sine.inOut" }, TR + 0.05);

      /* ---------- SCENE 2 (18 – 38s) ---------- */
      // blurred product interface comes alive with a slow drift the whole scene
      tl.fromTo("#obl-1", { x: -40, y: -30 }, { x: 60, y: 50, duration: 20, ease: "sine.inOut" }, 18);
      tl.fromTo("#obl-2", { x: 50, y: 30 }, { x: -60, y: -40, duration: 20, ease: "sine.inOut" }, 18);
      tl.fromTo("#obl-3", { x: -30, y: 40 }, { x: 50, y: -50, duration: 20, ease: "sine.inOut" }, 18);

      // modal spring scale-in: 0.88 -> 1.04 -> 1.0 over 16 frames + translateY
      const MS = 18.3;
      tl.to("#ob-modal", { autoAlpha: 1, duration: 0.10 }, MS);
      tl.to("#ob-modal", { scale: 1.04, y: 0, duration: f(10), ease: "power3.out" }, MS);
      tl.to("#ob-modal", { scale: 1.0, duration: f(6), ease: "power2.inOut" }, MS + f(10));

      // icon first, then headline word by word, then descriptor
      tl.to(".ob-icon", { scale: 1, autoAlpha: 1, duration: 0.5, ease: "back.out(2)" }, MS + 0.45);
      tl.to(headWords, { autoAlpha: 1, y: 0, duration: 0.45, ease: "power2.out", stagger: 0.16 }, MS + 0.9);
      tl.to("#ob-desc", { autoAlpha: 1, y: 0, duration: 0.55, ease: "power2.out" }, MS + 1.6);

      // three feature rows, 12-frame stagger
      tl.to(obRows, { autoAlpha: 1, y: 0, scale: 1, duration: 0.5, ease: "power3.out", stagger: f(12) }, MS + 2.1);

      // two buttons side by side
      tl.to(["#ob-secondary", "#ob-primary"], { autoAlpha: 1, y: 0, duration: 0.5, ease: "power2.out", stagger: 0.1 }, MS + 3.6);

      // cursor enters and clicks the primary button
      const PX = 2196, PY = 1614; // primary button centre
      tl.set("#cursor", { x: 2520, y: 2020 }, MS + 4.6);
      tl.to("#cursor", { autoAlpha: 1, duration: 0.3 }, MS + 4.6);
      tl.to("#cursor", { x: PX + 6, y: PY + 8, duration: 1.1, ease: "power2.inOut" }, MS + 4.7);
      // subtle hover brighten on the primary just before the click
      tl.to("#ob-primary", { backgroundColor: "rgba(59,130,246,0.34)", duration: 0.3, ease: "power2.out" }, MS + 5.6);
      const click = MS + 6.0; // ~24.3s
      tl.to("#ob-primary .pflash", { autoAlpha: 1, duration: f(2) }, click);
      tl.to("#ob-primary .pflash", { autoAlpha: 0, duration: 0.2 }, click + f(2));
      tl.to("#ob-primary", { scale: 0.88, duration: 0.10, ease: "power2.in", transformOrigin: "50% 50%" }, click);
      tl.to("#ob-primary", { scale: 1.0, duration: 0.4, ease: "elastic.out(1, 0.5)" }, click + 0.10);
      tl.to("#cursor", { y: PY - 6, duration: 0.12, ease: "power2.in", yoyo: true, repeat: 1 }, click);
      tl.to("#cursor", { x: 2560, y: 2060, autoAlpha: 0, duration: 0.8, ease: "power2.in" }, click + 0.7);

      // hold on the assembled modal, then dismiss (final scene — exits allowed)
      const DIS = MS + 13.0; // ~31.3s
      tl.to("#ob-modal", { scale: 0.9, autoAlpha: 0, duration: f(12), ease: "power2.in" }, DIS);
      tl.to("#ob-overlay", { autoAlpha: 0, duration: 0.6, ease: "power2.out" }, DIS);
      tl.to("#ob-bg", { filter: "blur(0px)", duration: 0.7, ease: "power2.out" }, DIS);
      // the product is ready — holds bright while the blobs keep drifting to ~38s

      window.__timelines["main"] = tl;
    </script>
  </body>
