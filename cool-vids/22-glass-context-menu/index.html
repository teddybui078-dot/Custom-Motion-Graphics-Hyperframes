<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=3840, height=2160" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 3840px; height: 2160px; overflow: hidden;
        font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; }

      .stage { position: absolute; inset: 0; overflow: visible; background: #0a0b10; }

      /* blurred dark product UI behind the glass */
      .ui { position: absolute; inset: 0; filter: blur(16px) saturate(1.05); }
      .ui-side { position: absolute; left: 0; top: 0; bottom: 0; width: 560px; background: #11131d; border-right: 1px solid #1c2030; }
      .ui-nav { height: 92px; margin: 36px 40px; border-radius: 20px; background: rgba(255,255,255,0.05); }
      .ui-nav.on { background: rgba(99,130,246,0.22); }
      .ui-top { position: absolute; left: 560px; right: 0; top: 0; height: 150px; background: #0e1018; border-bottom: 1px solid #1c2030; }
      .ui-top .pill { position: absolute; top: 44px; left: 60px; width: 720px; height: 62px; border-radius: 31px; background: rgba(255,255,255,0.06); }
      .ui-top .av { position: absolute; top: 40px; right: 60px; width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg,#6366f1,#22d3ee); }
      .ui-main { position: absolute; left: 560px; right: 0; top: 150px; bottom: 0; padding: 64px; }
      .ui-cards { display: flex; gap: 48px; }
      .ui-card { flex: 1; height: 320px; border-radius: 28px; background: #141726; border: 1px solid #20253a; }
      .ui-card .b { height: 48px; margin: 36px; border-radius: 12px; background: rgba(255,255,255,0.06); }
      .ui-card .n { height: 90px; margin: 0 36px; border-radius: 12px; background: rgba(255,255,255,0.10); width: 60%; }
      .ui-chart { margin-top: 56px; height: 720px; border-radius: 28px; background: #141726; border: 1px solid #20253a; position: relative; overflow: hidden; }
      .ui-bars { position: absolute; left: 70px; right: 70px; bottom: 70px; height: 480px; display: flex; align-items: flex-end; gap: 40px; }
      .ui-bars i { flex: 1; border-radius: 14px 14px 0 0; background: linear-gradient(180deg, rgba(99,130,246,0.7), rgba(99,130,246,0.15)); }
      .ui-rows { margin-top: 40px; }
      .ui-rows .r { height: 88px; border-radius: 16px; background: rgba(255,255,255,0.04); margin-bottom: 22px; }

      /* drifting colour blobs */
      .blob { position: absolute; border-radius: 50%; filter: blur(200px); mix-blend-mode: screen; will-change: transform; }
      .blob.a { left: 6%;  top: -10%; width: 1500px; height: 1500px; background: #6d28d9; opacity: 0.5; }
      .blob.b { right: 4%; top: 30%;  width: 1500px; height: 1500px; background: #0e7490; opacity: 0.5; }
      .blob.c { left: 34%; bottom: -16%; width: 1400px; height: 1400px; background: #be185d; opacity: 0.42; }
      .dimmer { position: absolute; inset: 0; background: rgba(6,7,12,0.45); }

      /* context menu (glass card) */
      .menu { position: absolute; width: 660px; border-radius: 42px; padding: 24px 0; overflow: hidden;
        transform-origin: 0% 0%; opacity: 0;
        background: rgba(255,255,255,0.10);
        backdrop-filter: blur(60px) saturate(160%); -webkit-backdrop-filter: blur(60px) saturate(160%);
        border: 1px solid rgba(255,255,255,0.16);
        box-shadow: 0 60px 130px rgba(0,0,0,0.6), inset 0 2px 0 rgba(255,255,255,0.4); }
      .mi { position: relative; height: 132px; display: flex; align-items: center; gap: 36px; padding: 0 40px; opacity: 0; }
      .mi .hl { position: absolute; inset: 8px 16px; border-radius: 24px; opacity: 0;
        background: linear-gradient(90deg, rgba(255,255,255,0.22), rgba(255,255,255,0.10));
        box-shadow: inset 0 0 0 1.5px rgba(255,255,255,0.28); }
      .mi.danger .hl { background: linear-gradient(90deg, rgba(244,63,94,0.40), rgba(244,63,94,0.18));
        box-shadow: inset 0 0 0 1.5px rgba(244,63,94,0.5); }
      .mi .ico { position: relative; z-index: 2; width: 60px; height: 60px; flex: none; display: flex; align-items: center; justify-content: center; }
      .mi .ico svg { width: 56px; height: 56px; stroke: rgba(255,255,255,0.85); fill: none; stroke-width: 2.1; stroke-linecap: round; stroke-linejoin: round; }
      .mi .lbl { position: relative; z-index: 2; white-space: nowrap; font-size: 42px; font-weight: 500; color: rgba(255,255,255,0.92); }
      .mi.danger .ico svg { stroke: #fb7185; }
      .mi.danger .lbl { color: #fb7185; }
      .mdiv { height: 3px; margin: 14px 40px; background: rgba(255,255,255,0.14); border-radius: 2px; opacity: 0; }

      #cursor { position: absolute; left: 0; top: 0; z-index: 90;
        filter: drop-shadow(0 10px 16px rgba(0,0,0,0.6)); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="3840" data-height="2160">
      <div class="stage" data-layout-allow-overflow>
        <div class="ui">
          <div class="ui-side">
            <div class="ui-nav on"></div><div class="ui-nav"></div><div class="ui-nav"></div>
            <div class="ui-nav"></div><div class="ui-nav"></div><div class="ui-nav"></div>
          </div>
          <div class="ui-top"><div class="pill"></div><div class="av"></div></div>
          <div class="ui-main">
            <div class="ui-cards">
              <div class="ui-card"><div class="b"></div><div class="n"></div></div>
              <div class="ui-card"><div class="b"></div><div class="n"></div></div>
              <div class="ui-card"><div class="b"></div><div class="n"></div></div>
            </div>
            <div class="ui-chart"><div class="ui-bars"><i style="height:42%"></i><i style="height:66%"></i><i style="height:38%"></i><i style="height:82%"></i><i style="height:55%"></i><i style="height:73%"></i><i style="height:48%"></i><i style="height:90%"></i><i style="height:61%"></i></div></div>
          </div>
        </div>

        <div class="blob a" id="bA"></div>
        <div class="blob b" id="bB"></div>
        <div class="blob c" id="bC"></div>
        <div class="dimmer"></div>

        <div class="menu" id="menu"></div>

        <div id="cursor">
          <svg width="84" height="100" viewBox="0 0 24 28">
            <path d="M3,2 L3,22 L8.5,16.8 L12,24.5 L15.4,23 L11.9,15.3 L19,15.3 Z"
                  fill="#ffffff" stroke="#1b1b22" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const $ = (s) => document.querySelector(s);
      const FPS = 30, f = (n) => n / FPS;

      const CLICK_X = 1360, CLICK_Y = 430;   // where the right-click happens

      // ---------- icons ----------
      const I = {
        open: '<path d="M5 5h6l2 3h6v11H5z"/>',
        win: '<rect x="4" y="5" width="16" height="14" rx="2"/><path d="M4 9h16"/>',
        rename: '<path d="M5 19l1-4L17 4l3 3L9 18z"/><path d="M14 7l3 3"/>',
        copy: '<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5h10"/>',
        dup: '<rect x="4" y="4" width="11" height="11" rx="2"/><rect x="9" y="9" width="11" height="11" rx="2"/>',
        trash: '<path d="M4 7h16M9 7V4h6v3M6 7l1.5 14h9L18 7"/>',
        share: '<circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="6" r="2.6"/><circle cx="18" cy="18" r="2.6"/><path d="M8.3 10.8l7.4-3.6M8.3 13.2l7.4 3.6"/>',
        info: '<circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="8" r="0.6" fill="currentColor"/>',
      };
      const ITEMS = [
        { ic: I.open, t: "Open" },
        { ic: I.win, t: "Open in New Window" },
        { ic: I.rename, t: "Rename" },
        { div: true },
        { ic: I.copy, t: "Copy" },
        { ic: I.dup, t: "Duplicate" },
        { ic: I.trash, t: "Delete", danger: true },
        { div: true },
        { ic: I.share, t: "Share" },
        { ic: I.info, t: "Get Info" },
      ];

      const menu = $("#menu");
      menu.style.left = CLICK_X + "px";
      menu.style.top = CLICK_Y + "px";
      const itemEls = [], divEls = [];
      ITEMS.forEach((it) => {
        if (it.div) {
          const d = document.createElement("div"); d.className = "mdiv";
          menu.appendChild(d); divEls.push(d);
        } else {
          const el = document.createElement("div");
          el.className = "mi" + (it.danger ? " danger" : "");
          el.innerHTML = `<div class="hl"></div><div class="ico"><svg viewBox="0 0 24 24">${it.ic}</svg></div><div class="lbl">${it.t}</div>`;
          menu.appendChild(el); itemEls.push(el);
        }
      });

      // measure each row's centre (menu at CSS rest, scale 1) for cursor targeting
      gsap.set("#menu", { opacity: 1, scale: 1 });
      const rowCtr = itemEls.map((el) => {
        const r = el.getBoundingClientRect();
        return { x: r.left + 120, y: r.top + r.height / 2 };
      });

      // ---------- initial states ----------
      gsap.set("#menu", { opacity: 0, scale: 0.85, transformOrigin: "0% 0%" });
      gsap.set(itemEls, { autoAlpha: 0, y: 8 });
      gsap.set(divEls, { autoAlpha: 0 });
      gsap.set("#cursor", { x: CLICK_X - 8, y: CLICK_Y - 6 });

      // ===================== TIMELINE =====================
      const tl = gsap.timeline({ paused: true });

      // blobs drift
      tl.fromTo("#bA", { x: -40, y: 20 }, { x: 60, y: -40, duration: 12, ease: "sine.inOut" }, 0);
      tl.fromTo("#bB", { x: 40, y: -30 }, { x: -60, y: 40, duration: 12, ease: "sine.inOut" }, 0);
      tl.fromTo("#bC", { x: 20, y: 30 }, { x: -40, y: -30, duration: 12, ease: "sine.inOut" }, 0);

      // right-click: a single-frame scale-down of the cursor tip
      tl.to("#cursor", { scale: 0.78, duration: f(1), yoyo: true, repeat: 1, ease: "none", transformOrigin: "0% 0%" }, 0.7);

      // menu materializes from the click point: 0.85 -> 1.02 -> 1.0
      tl.to("#menu", { opacity: 1, scale: 1.02, duration: 0.22, ease: "power3.out" }, 0.82);
      tl.to("#menu", { scale: 1.0, duration: 0.12, ease: "power2.inOut" }, 1.04);

      // items fade in top->bottom, 4-frame stagger; dividers appear with their groups
      itemEls.forEach((el, i) => {
        tl.to(el, { autoAlpha: 1, y: 0, duration: 0.22, ease: "power2.out" }, 1.15 + i * f(4));
      });
      tl.to(divEls[0], { autoAlpha: 1, duration: 0.2 }, 1.15 + 3 * f(4));
      tl.to(divEls[1], { autoAlpha: 1, duration: 0.2 }, 1.15 + 6 * f(4));

      // cursor moves into the menu and travels down through every item
      let t = 2.6;
      tl.to("#cursor", { x: rowCtr[0].x + 6, y: rowCtr[0].y - 4, duration: 0.5, ease: "power2.inOut" }, t);
      t += 0.55;
      itemEls.forEach((el, i) => {
        const hl = el.querySelector(".hl");
        // move cursor onto this row
        tl.to("#cursor", { x: rowCtr[i].x + 6, y: rowCtr[i].y - 4, duration: 0.34, ease: "power1.inOut" }, t);
        // light it up, dim the previous
        tl.to(hl, { autoAlpha: 1, duration: 0.18, ease: "power2.out" }, t + 0.04);
        if (i > 0) tl.to(itemEls[i - 1].querySelector(".hl"), { autoAlpha: 0, duration: 0.18 }, t + 0.04);
        t += 0.62;
      });

      // click a non-destructive item (last item, "Get Info") -> menu scales back to click point and fades over 8 frames
      tl.to("#cursor", { scale: 0.82, duration: f(1), yoyo: true, repeat: 1, ease: "none", transformOrigin: "0% 0%" }, t);
      tl.to(itemEls[itemEls.length - 1].querySelector(".hl"), { autoAlpha: 0.0, duration: 0.15 }, t + 0.25);
      tl.to("#menu", { scale: 0.85, opacity: 0, duration: f(8), ease: "power2.in", transformOrigin: "0% 0%" }, t + 0.25);
      tl.to("#cursor", { x: CLICK_X + 30, y: CLICK_Y + 40, duration: 0.6, ease: "power2.out" }, t + 0.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
