<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=3840, height=2160" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 3840px; height: 2160px; overflow: hidden;
        font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; }

      /* deep navy -> purple canvas (radial to avoid H.264 banding) */
      .stage { position: absolute; inset: 0; overflow: hidden;
        background: radial-gradient(135% 130% at 28% 18%, #533483 0%, #36295c 38%, #221d3a 68%, #1a1a2e 100%); }
      .grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.05; mix-blend-mode: overlay;
        background-image: radial-gradient(rgba(255,255,255,0.7) 1px, transparent 1px); background-size: 4px 4px; }

      /* soft drifting color blooms */
      .blob { position: absolute; border-radius: 50%; filter: blur(150px); will-change: transform; }
      .blob.purple { left: 240px;  top: -260px;  width: 1700px; height: 1700px; background: #a855f7; opacity: 0.55; }
      .blob.teal   { right: -160px; bottom: -320px; width: 1600px; height: 1600px; background: #2dd4bf; opacity: 0.42; }
      .blob.pink   { right: 520px;  top: 560px;  width: 1500px; height: 1500px; background: #ec4899; opacity: 0.40; }

      /* dock */
      .dock-wrap { position: absolute; left: 50%; top: 904px; transform: translateX(-50%); }
      .dock { position: relative; display: flex; align-items: center; gap: 48px; padding: 56px;
        border-radius: 176px; overflow: visible;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(60px) saturate(160%); -webkit-backdrop-filter: blur(60px) saturate(160%);
        border: 1px solid rgba(255,255,255,0.16);
        box-shadow:
          inset 0 3px 0 rgba(255,255,255,0.5),     /* top rim of light */
          inset 3px 0 0 rgba(255,255,255,0.5),     /* left rim of light */
          inset 0 -2px 0 rgba(0,0,0,0.18),
          0 60px 140px rgba(10,8,30,0.55),
          0 8px 30px rgba(10,8,30,0.4); }

      /* icons */
      .icon { position: relative; width: 240px; height: 240px; flex: none;
        transform-origin: 50% 100%; }
      .ic-glass { position: absolute; inset: 0; border-radius: 56px; overflow: hidden;
        background: rgba(255,255,255,0.14);
        backdrop-filter: blur(26px) saturate(150%); -webkit-backdrop-filter: blur(26px) saturate(150%);
        border: 1px solid rgba(255,255,255,0.22);
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.45), inset 2px 0 0 rgba(255,255,255,0.3),
                    inset 0 -3px 8px rgba(0,0,0,0.18), 0 14px 30px rgba(8,6,24,0.4); }
      /* colored bleed from the nearest blob, hidden until the icon lands */
      .ic-tint { position: absolute; inset: 0; border-radius: 56px; opacity: 0; mix-blend-mode: screen;
        background: radial-gradient(120% 120% at 30% 25%, var(--tint) 0%, transparent 70%); }
      /* hover brighten + extra rim, both start invisible */
      .ic-bright { position: absolute; inset: 0; border-radius: 56px; opacity: 0; pointer-events: none;
        background: radial-gradient(130% 130% at 32% 22%, rgba(255,255,255,0.55), rgba(255,255,255,0.06) 60%, transparent 78%); }
      .ic-rim { position: absolute; inset: 0; border-radius: 56px; opacity: 0; pointer-events: none;
        box-shadow: inset 0 3px 0 rgba(255,255,255,0.85), inset 3px 0 0 rgba(255,255,255,0.6),
                    inset 0 0 26px rgba(255,255,255,0.35); }
      .ic-glyph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
      .ic-glyph svg { width: 118px; height: 118px; stroke: rgba(255,255,255,0.92); fill: none;
        stroke-width: 7; stroke-linecap: round; stroke-linejoin: round;
        filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3)); }

      #cursor { position: absolute; left: 0; top: 0; z-index: 90; opacity: 0;
        filter: drop-shadow(0 10px 14px rgba(0,0,0,0.55)); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12" data-width="3840" data-height="2160">
      <div class="stage" data-layout-allow-overflow>
        <div class="blob purple" id="b-purple"></div>
        <div class="blob teal" id="b-teal"></div>
        <div class="blob pink" id="b-pink"></div>

        <div class="dock-wrap" id="dockwrap" data-layout-allow-overflow>
          <div class="dock" id="dock" data-layout-allow-overflow></div>
        </div>

        <div id="cursor">
          <svg width="78" height="92" viewBox="0 0 24 28">
            <path d="M3,2 L3,22 L8.5,16.8 L12,24.5 L15.4,23 L11.9,15.3 L19,15.3 Z"
                  fill="#ffffff" stroke="#1b1b22" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="grain"></div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const $ = (s) => document.querySelector(s);

      const FPS = 30;
      const f = (n) => n / FPS; // frames -> seconds

      // ---------- layout constants (mirror the CSS) ----------
      const DOCK_LEFT = 1024, DOCK_TOP = 904, PAD = 56, ICON = 240, GAP = 48;
      const iconCenterX = (i) => DOCK_LEFT + PAD + i * (ICON + GAP) + ICON / 2;
      const ICON_CY = DOCK_TOP + 176; // dock vertical centre

      // ---------- icons ----------
      const GLYPHS = [
        '<path d="M4 5h16v11H9l-4 4z"/>',                                              // message
        '<rect x="4" y="5" width="16" height="15" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/>', // calendar
        '<rect x="3" y="7" width="18" height="13" rx="3"/><circle cx="12" cy="13.5" r="3.6"/><path d="M8 7l1.6-3h4.8L16 7"/>', // camera
        '<circle cx="7" cy="18" r="2.6"/><circle cx="18" cy="16" r="2.6"/><path d="M9.6 18V5l11-2v11"/>', // music
        '<circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.5 5.5l2.1 2.1M16.4 16.4l2.1 2.1M18.5 5.5l-2.1 2.1M7.6 16.4l-2.1 2.1"/>', // gear
        '<path d="M12 20S4 14.5 4 9.2A4.2 4.2 0 0 1 12 7a4.2 4.2 0 0 1 8 2.2C20 14.5 12 20 12 20z"/>', // heart
      ];
      const TINTS = ["#c084fc", "#c084fc", "#f472b6", "#f472b6", "#5eead4", "#5eead4"]; // purple,purple,pink,pink,teal,teal

      const dock = $("#dock");
      const icons = [];
      for (let i = 0; i < 6; i++) {
        const el = document.createElement("div");
        el.className = "icon";
        el.id = "icon-" + i;
        el.innerHTML =
          `<div class="ic-glass"></div>` +
          `<div class="ic-tint" style="--tint:${TINTS[i]}"></div>` +
          `<div class="ic-bright"></div>` +
          `<div class="ic-rim"></div>` +
          `<div class="ic-glyph"><svg viewBox="0 0 24 24">${GLYPHS[i]}</svg></div>`;
        dock.appendChild(el);
        icons.push(el);
      }
      const tints  = icons.map((e) => e.querySelector(".ic-tint"));
      const brights = icons.map((e) => e.querySelector(".ic-bright"));
      const rims   = icons.map((e) => e.querySelector(".ic-rim"));

      // ---------- initial states ----------
      gsap.set("#dockwrap", { xPercent: -50, y: 1500 });  // keep centring through y tweens; start below canvas
      gsap.set(icons, { scale: 0, autoAlpha: 0, transformOrigin: "50% 100%" });
      gsap.set("#cursor", { autoAlpha: 0, x: 3520, y: 1180 });

      // ===================== TIMELINE =====================
      const tl = gsap.timeline({ paused: true });

      // --- background blooms drift imperceptibly across the whole 12s ---
      tl.fromTo("#b-purple", { x: -40, y: -30 }, { x: 70, y: 50, duration: 12, ease: "sine.inOut" }, 0);
      tl.fromTo("#b-teal",   { x: 50, y: 40 },   { x: -60, y: -40, duration: 12, ease: "sine.inOut" }, 0);
      tl.fromTo("#b-pink",   { x: 20, y: -50 },  { x: -50, y: 60, duration: 12, ease: "sine.inOut" }, 0);

      // --- dock rises from below with a spring: overshoot 12px, two damped oscillations ---
      let t = 0.3;
      tl.to("#dockwrap", { y: -12, duration: 0.62, ease: "power3.out" }, t);          // rise + overshoot up 12px
      tl.to("#dockwrap", { y: 6,   duration: 0.20, ease: "sine.inOut" }, t + 0.62);   // bounce 1 down
      tl.to("#dockwrap", { y: -3,  duration: 0.17, ease: "sine.inOut" }, t + 0.82);   // bounce 2 up
      tl.to("#dockwrap", { y: 0,   duration: 0.15, ease: "sine.inOut" }, t + 0.99);   // settle

      // --- icons materialize L->R, 8 frames apart, spring pop 0 -> 1.08 -> 1.0 ---
      const popStart = 1.35;
      const step = f(8); // 8 frames between each
      icons.forEach((el, i) => {
        const ts = popStart + i * step;
        tl.to(el, { autoAlpha: 1, duration: 0.12 }, ts);
        tl.to(el, { scale: 1.08, duration: 0.22, ease: "power3.out" }, ts);
        tl.to(el, { scale: 1.0,  duration: 0.30, ease: "elastic.out(1, 0.55)" }, ts + 0.22);
        // the nearest blob's colour bleeds through the frosted surface as it lands
        tl.to(tints[i], { autoAlpha: 0.5, duration: 0.5, ease: "power2.out" }, ts + 0.1);
      });
      const allPlaced = popStart + 5 * step + 0.5; // ~3.18s

      // --- cursor enters from the right and hovers the third icon (index 2) ---
      const cur = 3.5;
      tl.to("#cursor", { autoAlpha: 1, duration: 0.3 }, cur);
      tl.to("#cursor", { x: iconCenterX(2) + 26, y: ICON_CY + 18, duration: 0.7, ease: "power2.inOut" }, cur);

      // --- macOS dock magnification on arrival ---
      const hov = cur + 0.7;            // ~4.2s
      // third icon lifts + scales to 1.2, glass brightens, rim intensifies
      tl.to(icons[2], { scale: 1.2, y: -42, duration: 0.34, ease: "back.out(2.2)" }, hov);
      tl.to(brights[2], { autoAlpha: 1, duration: 0.34, ease: "power2.out" }, hov);
      tl.to(rims[2], { autoAlpha: 1, duration: 0.34, ease: "power2.out" }, hov);
      // adjacent icons grow in sympathy to 1.08
      tl.to([icons[1], icons[3]], { scale: 1.08, y: -14, duration: 0.34, ease: "back.out(1.8)" }, hov + 0.03);
      tl.to([brights[1], brights[3]], { autoAlpha: 0.45, duration: 0.34 }, hov + 0.03);
      // a small twitch of the cursor as it settles on the icon
      tl.to("#cursor", { y: ICON_CY + 6, duration: 0.5, ease: "sine.inOut" }, hov);

      // hold the magnified state
      const leave = hov + 1.7;          // ~5.9s

      // --- cursor moves away, every icon settles back ---
      tl.to(icons[2], { scale: 1.0, y: 0, duration: 0.45, ease: "power3.out" }, leave);
      tl.to([icons[1], icons[3]], { scale: 1.0, y: 0, duration: 0.45, ease: "power3.out" }, leave + 0.02);
      tl.to([brights[1], brights[2], brights[3]], { autoAlpha: 0, duration: 0.4 }, leave);
      tl.to(rims[2], { autoAlpha: 0, duration: 0.4 }, leave);
      tl.to("#cursor", { x: 3620, y: 1320, autoAlpha: 0, duration: 0.8, ease: "power2.in" }, leave + 0.1);

      // --- dock holds, gently breathing while the blobs keep drifting behind it ---
      const holdStart = leave + 0.9;    // ~6.8s
      const breatheCycle = 2.4;
      const reps = Math.ceil((12 - holdStart) / breatheCycle) - 1;
      tl.to("#dock", { y: -8, duration: breatheCycle / 2, ease: "sine.inOut", yoyo: true, repeat: reps }, holdStart);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
