<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=3840, height=2160" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 3840px; height: 2160px; overflow: hidden;
        font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; }

      .stage { position: absolute; inset: 0; overflow: hidden; background: #0a0612; }

      /* ---- dense, busy, vivid background (so the glass clearly works) ---- */
      .bg { position: absolute; inset: -6%; }
      .blob { position: absolute; border-radius: 50%; filter: blur(120px); will-change: transform; }
      .blob.b1 { left: -4%;  top: -10%; width: 1500px; height: 1500px; background: #ff2e88; opacity: 0.85; }
      .blob.b2 { right: -6%; top: -8%;  width: 1600px; height: 1600px; background: #00d4ff; opacity: 0.8; }
      .blob.b3 { left: 24%;  bottom: -16%; width: 1700px; height: 1700px; background: #7c3aed; opacity: 0.8; }
      .blob.b4 { right: 14%; bottom: -10%; width: 1300px; height: 1300px; background: #ffae00; opacity: 0.75; }
      .blob.b5 { left: 40%;  top: 18%;  width: 1100px; height: 1100px; background: #00e08a; opacity: 0.6; }
      .blob.b6 { left: 8%;   top: 42%;  width: 1000px; height: 1000px; background: #ff5e3a; opacity: 0.6; }
      /* abstract shapes for extra busyness */
      .shape { position: absolute; will-change: transform; opacity: 0.5; }
      .ring { border-radius: 50%; border: 60px solid rgba(255,255,255,0.10); }
      .r1 { left: 14%; top: 50%; width: 720px; height: 720px; }
      .r2 { right: 10%; top: 14%; width: 540px; height: 540px; border-color: rgba(255,225,120,0.18); }
      .pill { border-radius: 200px; }
      .p1 { right: 26%; bottom: 20%; width: 900px; height: 300px; background: linear-gradient(90deg,#ff2e88,#ffae00); transform: rotate(-24deg); opacity: 0.4; filter: blur(8px); }
      .p2 { left: 6%; bottom: 22%; width: 760px; height: 240px; background: linear-gradient(90deg,#00d4ff,#7c3aed); transform: rotate(18deg); opacity: 0.4; filter: blur(8px); }
      .dot { border-radius: 50%; background: rgba(255,255,255,0.5); filter: blur(2px); }
      .grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.06; mix-blend-mode: overlay;
        background-image: radial-gradient(rgba(255,255,255,0.8) 1px, transparent 1px); background-size: 4px 4px; }

      /* ---- glass button (2x of the 280x72 spec for the 4K canvas) ---- */
      .btn-wrap { position: absolute; left: 50%; top: 50%; width: 560px; height: 144px; }
      .b-shadow { position: absolute; left: 50%; top: 64%; width: 520px; height: 120px; transform: translateX(-50%);
        border-radius: 72px; background: #000; filter: blur(60px); opacity: 0; z-index: 0; }
      .btn { position: absolute; inset: 0; border-radius: 72px; overflow: hidden; z-index: 1;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(40px) saturate(150%) brightness(1.05) hue-rotate(8deg);
        -webkit-backdrop-filter: blur(40px) saturate(150%) brightness(1.05) hue-rotate(8deg);
        border: 1px solid rgba(255,255,255,0.18);
        box-shadow: 0 30px 60px rgba(0,0,0,0.30); }
      /* inset highlight stroke on top + left, 55% white at rest (opacity carries the % value) */
      .b-rim { position: absolute; inset: 0; border-radius: 72px; pointer-events: none; opacity: 0.55;
        box-shadow: inset 0 3px 0 rgba(255,255,255,1), inset 3px 0 0 rgba(255,255,255,1),
                    inset 0 0 22px rgba(255,255,255,0.25), inset 0 -3px 10px rgba(0,0,0,0.18); }
      /* momentary brighten as pressure releases */
      .b-flash { position: absolute; inset: 0; border-radius: 72px; pointer-events: none; opacity: 0; mix-blend-mode: screen;
        background: radial-gradient(130% 130% at 34% 22%, rgba(255,255,255,0.7), rgba(255,255,255,0.1) 55%, transparent 75%); }
      .b-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2;
        color: rgba(255,255,255,0.82); font-size: 52px; font-weight: 500; letter-spacing: 0.5px; }

      #cursor { position: absolute; left: 0; top: 0; z-index: 90; opacity: 0;
        filter: drop-shadow(0 10px 14px rgba(0,0,0,0.5)); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="10" data-width="3840" data-height="2160">
      <div class="stage" data-layout-allow-overflow>
        <div class="bg" id="bg" data-layout-allow-overflow>
          <div class="blob b1" id="s1"></div>
          <div class="blob b2" id="s2"></div>
          <div class="blob b3" id="s3"></div>
          <div class="blob b4" id="s4"></div>
          <div class="blob b5" id="s5"></div>
          <div class="blob b6" id="s6"></div>
          <div class="shape ring r1" id="s7"></div>
          <div class="shape ring r2" id="s8"></div>
          <div class="shape pill p1" id="s9"></div>
          <div class="shape pill p2" id="s10"></div>
          <div class="shape dot" id="s11" style="left:62%; top:30%; width:120px; height:120px;"></div>
          <div class="shape dot" id="s12" style="left:30%; top:70%; width:90px; height:90px;"></div>
        </div>

        <div class="btn-wrap" id="btnwrap" data-layout-allow-overflow>
          <div class="b-shadow" id="bshadow"></div>
          <div class="btn" id="btn">
            <div class="b-rim" id="brim"></div>
            <div class="b-flash" id="bflash"></div>
            <div class="b-label">Get Started</div>
          </div>
        </div>

        <div id="cursor">
          <svg width="78" height="92" viewBox="0 0 24 28">
            <path d="M3,2 L3,22 L8.5,16.8 L12,24.5 L15.4,23 L11.9,15.3 L19,15.3 Z"
                  fill="#ffffff" stroke="#1b1b22" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="grain"></div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const FPS = 30;
      const f = (n) => n / FPS; // frames -> seconds

      const BTN_CX = 1920, BTN_CY = 1080; // button centre on the 4K canvas

      // ---------- initial states ----------
      gsap.set("#btnwrap", { xPercent: -50, yPercent: -50, scale: 0, autoAlpha: 0, transformOrigin: "50% 50%" });
      gsap.set("#cursor", { autoAlpha: 0, x: 2540, y: 1420 });

      // ===================== TIMELINE =====================
      const tl = gsap.timeline({ paused: true });

      // --- busy background drifts slowly the whole time (single slow pass each) ---
      const drift = [
        ["#s1", 60, 40], ["#s2", -70, 30], ["#s3", 40, -50], ["#s4", -50, -40],
        ["#s5", 30, 50], ["#s6", 50, -30], ["#s7", -40, 24], ["#s8", 36, 40],
        ["#s9", -30, -20], ["#s10", 28, 26], ["#s11", -24, 30], ["#s12", 30, -22],
      ];
      drift.forEach(([sel, dx, dy]) => {
        tl.fromTo(sel, { x: -dx * 0.5, y: -dy * 0.5 }, { x: dx * 0.5, y: dy * 0.5, duration: 10, ease: "sine.inOut" }, 0);
      });

      // --- entrance: single spring pop, scale 0 -> 1.06 -> 1.0 over 14 frames ---
      let t = 0.3;
      tl.to("#btnwrap", { autoAlpha: 1, duration: 0.08 }, t);
      tl.to("#btnwrap", { scale: 1.06, duration: f(9), ease: "power3.out" }, t);
      tl.to("#btnwrap", { scale: 1.0, duration: f(5), ease: "power2.inOut" }, t + f(9));

      // --- holds for 2 seconds, then the cursor enters ---
      const cursorIn = t + f(14) + 2.0;            // ~2.77s
      tl.to("#cursor", { autoAlpha: 1, duration: 0.3 }, cursorIn);
      tl.to("#cursor", { x: BTN_CX + 60, y: BTN_CY + 30, duration: 0.7, ease: "power2.inOut" }, cursorIn);

      // --- gentle hover lift: scale 1.03, inset highlight brightens to 65% ---
      const hover = cursorIn + 0.7;                // ~3.47s
      tl.to("#btnwrap", { scale: 1.03, duration: 0.22, ease: "power2.out" }, hover);
      tl.to("#brim", { autoAlpha: 0.65, duration: 0.22, ease: "power2.out" }, hover);

      // --- the click ---
      const click = hover + 0.9;                   // ~4.37s
      // small cursor nudge into the press
      tl.to("#cursor", { y: BTN_CY + 18, duration: f(2), ease: "power2.in" }, click - f(2));
      // compression: scale drops to 0.95; rim flashes to 80%; drop shadow deepens
      tl.to("#btnwrap", { scale: 0.95, duration: f(2), ease: "power2.in" }, click);
      tl.to("#brim", { autoAlpha: 0.80, duration: f(2), ease: "power2.in" }, click);
      tl.to("#bshadow", { autoAlpha: 0.5, duration: f(2), ease: "power2.in" }, click);
      // spring back through 1.04 to 1.0 over 10 frames
      tl.to("#btnwrap", { scale: 1.04, duration: f(6), ease: "back.out(3)" }, click + f(2));
      tl.to("#btnwrap", { scale: 1.0, duration: f(4), ease: "power2.out" }, click + f(8));
      // surface brightens momentarily as pressure releases (glass catching light)
      tl.to("#bflash", { autoAlpha: 0.4, duration: f(4), ease: "power2.out" }, click + f(2));
      tl.to("#bflash", { autoAlpha: 0, duration: 0.4, ease: "power2.in" }, click + f(6));
      // rim & shadow settle back to the hover/rest baseline
      tl.to("#brim", { autoAlpha: 0.62, duration: 0.3, ease: "power2.out" }, click + f(8));
      tl.to("#bshadow", { autoAlpha: 0, duration: 0.5, ease: "power2.out" }, click + f(6));

      // --- after the press the button holds; the cursor drifts away, background still visible ---
      const leave = click + 1.0;                   // ~5.4s
      tl.to("#cursor", { x: 2700, y: 1560, autoAlpha: 0, duration: 0.9, ease: "power2.in" }, leave);
      tl.to("#btnwrap", { scale: 1.0, duration: 0.4, ease: "power2.out" }, leave);
      tl.to("#brim", { autoAlpha: 0.55, duration: 0.5, ease: "power2.out" }, leave + 0.2);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
