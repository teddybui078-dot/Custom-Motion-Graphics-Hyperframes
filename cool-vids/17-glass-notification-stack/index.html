<!doctype html>
<html lang="en" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=2160, height=3840" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 2160px; height: 3840px; overflow: hidden;
        font-family: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif; }

      .stage { position: absolute; inset: 0; overflow: hidden;
        background: radial-gradient(125% 120% at 50% 50%, #111118 0%, #0c0c12 55%, #0a0a0f 100%); }

      /* two enormous drifting blooms behind everything */
      .blob { position: absolute; border-radius: 50%; filter: blur(220px); will-change: transform; }
      .blob.amber { right: -16%; top: -18%; width: 2000px; height: 2000px; background: #f59e0b; opacity: 0.55; }
      .blob.violet { left: -18%; bottom: -20%; width: 2100px; height: 2100px; background: #7c3aed; opacity: 0.55; }

      /* floating phone screen (no chrome — edges implied by a faint vignette) */
      .phone { position: absolute; left: 300px; top: 460px; width: 1560px; height: 2920px;
        border-radius: 120px; overflow: hidden; will-change: transform;
        box-shadow: 0 60px 160px rgba(0,0,0,0.55), inset 0 0 4px rgba(255,255,255,0.06); }
      .pvig { position: absolute; inset: 0; pointer-events: none; z-index: 50; border-radius: 120px;
        box-shadow: inset 0 0 140px rgba(0,0,0,0.6), inset 0 0 0 2px rgba(255,255,255,0.05); }

      /* blurred lock/home screen behind the glass */
      .home { position: absolute; inset: 0; filter: blur(12px) saturate(1.1);
        background: radial-gradient(90% 70% at 50% 22%, #2a2740 0%, #1b1930 45%, #12111d 100%); }
      .home .grid { position: absolute; left: 110px; right: 110px; top: 380px;
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 120px 130px; }
      .home .ic { aspect-ratio: 1; border-radius: 80px; opacity: 0.92; box-shadow: 0 18px 40px rgba(0,0,0,0.4); }
      .home .clock { position: absolute; left: 0; right: 0; top: 120px; text-align: center;
        font-size: 150px; font-weight: 700; color: rgba(255,255,255,0.85); letter-spacing: -2px; }

      /* notification cards */
      .notif { position: absolute; left: 96px; top: 360px; width: 1368px; height: 300px;
        border-radius: 88px; overflow: hidden; transform-origin: 50% 0; will-change: transform;
        background: rgba(255,255,255,0.10);
        backdrop-filter: blur(72px) saturate(150%); -webkit-backdrop-filter: blur(72px) saturate(150%);
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 40px 90px rgba(0,0,0,0.45); }
      .nf-rim { position: absolute; left: 0; right: 0; top: 0; height: 50%; pointer-events: none; border-radius: 88px 88px 0 0;
        box-shadow: inset 0 3px 0 rgba(255,255,255,0.45); }
      .nf-top { position: absolute; left: 0; top: 0; right: 0; height: 300px; display: flex; align-items: center; gap: 36px; padding: 0 48px; }
      .nf-icon { width: 128px; height: 128px; flex: none; border-radius: 34px; display: flex; align-items: center; justify-content: center;
        transform: scale(0); opacity: 0;
        box-shadow: inset 0 3px 0 rgba(255,255,255,0.5), 0 12px 26px rgba(0,0,0,0.3); }
      .nf-icon svg { width: 64px; height: 64px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .nf-body { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
      .nf-row { display: flex; align-items: baseline; justify-content: space-between; }
      .nf-app { font-size: 42px; font-weight: 600; letter-spacing: 1px; color: rgba(255,255,255,0.55); text-transform: uppercase; opacity: 0; }
      .nf-time { font-size: 40px; font-weight: 500; color: rgba(255,255,255,0.45); opacity: 0; }
      .nf-head { position: relative; font-size: 56px; font-weight: 500; color: #fff; }
      .nf-head .ch { opacity: 0; }
      .nf-caret { position: absolute; left: 0; top: 50%; width: 4px; height: 58px; background: rgba(255,255,255,0.8);
        border-radius: 2px; transform: translateY(-50%); opacity: 0; }
      /* expanded body (revealed when a card grows) */
      .nf-more { position: absolute; left: 212px; right: 48px; top: 300px; opacity: 0;
        font-size: 46px; font-weight: 400; line-height: 1.4; color: rgba(255,255,255,0.7); }
      .nf-actions { display: flex; gap: 24px; margin-top: 34px; }
      .nf-actions .btn { height: 92px; padding: 0 44px; border-radius: 46px; display: flex; align-items: center;
        font-size: 40px; font-weight: 600; color: #fff; background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.16); }

      #cursor { position: absolute; left: 0; top: 0; z-index: 100; opacity: 0;
        filter: drop-shadow(0 10px 16px rgba(0,0,0,0.55)); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="14" data-width="2160" data-height="3840">
      <div class="stage" data-layout-allow-overflow>
        <div class="blob amber" id="bAmber"></div>
        <div class="blob violet" id="bViolet"></div>

        <div class="phone" id="phone" data-layout-allow-overflow>
          <div class="home" id="home">
            <div class="clock">9:41</div>
            <div class="grid" id="homeGrid"></div>
          </div>
          <!-- notifications injected here by JS -->
          <div class="pvig"></div>
        </div>

        <div id="cursor">
          <svg width="80" height="96" viewBox="0 0 24 28">
            <path d="M3,2 L3,22 L8.5,16.8 L12,24.5 L15.4,23 L11.9,15.3 L19,15.3 Z"
                  fill="#ffffff" stroke="#1b1b22" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const $ = (s) => document.querySelector(s);
      const FPS = 30, f = (n) => n / FPS;

      // ---------- blurred home-screen icons ----------
      const ICONS = ["#34d399","#60a5fa","#f472b6","#fbbf24","#a78bfa","#22d3ee","#fb7185","#4ade80",
                     "#818cf8","#f0abfc","#fdba74","#5eead4","#93c5fd","#c4b5fd","#86efac","#fca5a5"];
      const grid = $("#homeGrid");
      ICONS.forEach((c) => {
        const d = document.createElement("div");
        d.className = "ic";
        d.style.background = `linear-gradient(150deg, ${c}, ${c}99)`;
        grid.appendChild(d);
      });

      // ---------- notifications ----------
      const MSG = '<path d="M4 5h16v11H9l-4 4z"/>';
      const CAL = '<rect x="4" y="5" width="16" height="15" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/>';
      const PAY = '<rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18M7 15h4"/>';
      const CARDS = [
        { ic: "#34d399", id: "#10b981", glyph: MSG, app: "Messages", time: "now",
          head: "Are we still on for tonight?",
          more: "Let me know if 7pm works, or if you'd rather push it a little later.",
          actions: ["Reply", "Mark as read"] },
        { ic: "#fb7185", id: "#e11d48", glyph: CAL, app: "Calendar", time: "9:41",
          head: "Design review in 15 minutes",
          more: "Meeting Room 3 · Product & Engineering. Tap to join the video call.",
          actions: ["Join", "Snooze"] },
        { ic: "#60a5fa", id: "#2563eb", glyph: PAY, app: "Wallet", time: "8:02",
          head: "You received $240.00",
          more: "From Jordan M. Your available balance is now $3,418.50.",
          actions: ["View", "Done"] },
      ];

      const phone = $("#phone");
      const cardEls = [], heads = [];
      CARDS.forEach((c, j) => {
        const el = document.createElement("div");
        el.className = "notif"; el.id = "nf" + j; el.style.zIndex = 40 - j;
        el.setAttribute("data-layout-allow-overflow", "");
        const charSpans = [...c.head].map((ch) => `<span class="ch">${ch === " " ? "&nbsp;" : ch}</span>`).join("");
        const acts = c.actions.map((a) => `<div class="btn">${a}</div>`).join("");
        el.innerHTML =
          `<div class="nf-rim"></div>` +
          `<div class="nf-top">` +
            `<div class="nf-icon" style="background:linear-gradient(150deg,${c.ic},${c.id})"><svg viewBox="0 0 24 24">${c.glyph}</svg></div>` +
            `<div class="nf-body">` +
              `<div class="nf-row"><div class="nf-app">${c.app}</div><div class="nf-time">${c.time}</div></div>` +
              `<div class="nf-head"><span class="htext">${charSpans}</span><span class="nf-caret"></span></div>` +
            `</div>` +
          `</div>` +
          `<div class="nf-more"><div class="mtext">${c.more}</div><div class="nf-actions">${acts}</div></div>`;
        phone.insertBefore(el, $(".pvig"));
        cardEls.push(el);
        const chars = el.querySelectorAll(".ch");
        const htext = el.querySelector(".htext");
        const baseLeft = htext.getBoundingClientRect().left;
        heads.push({
          chars, offsets: [...chars].map((c) => c.getBoundingClientRect().right - baseLeft),
          caret: el.querySelector(".nf-caret"), icon: el.querySelector(".nf-icon"),
          app: el.querySelector(".nf-app"), time: el.querySelector(".nf-time"),
          more: el.querySelector(".nf-more"),
        });
      });

      // ---------- stack / list geometry (phone-relative y offsets) ----------
      const CARD_H = 300, GAP = 42, EXP = 560;
      const STACK = [0, 98, 190];                 // perspective offsets (each peeks below the one in front)
      const STACK_S = [1, 0.95, 0.90];
      const LIST = [0, CARD_H + GAP, 2 * (CARD_H + GAP)];

      // ---------- initial states ----------
      cardEls.forEach((el, j) => gsap.set(el, { y: -680, scale: STACK_S[j], autoAlpha: 0, transformOrigin: "50% 0%" }));
      gsap.set("#cursor", { autoAlpha: 0, x: 1500, y: 2600 });

      // ---------- typing helper ----------
      const typeIn = (tl, h, t) => {
        const per = f(1.6);
        tl.to(h.caret, { autoAlpha: 1, duration: 0.1 }, t);
        h.chars.forEach((ch, i) => {
          tl.set(ch, { opacity: 1 }, t + i * per);
          tl.set(h.caret, { left: h.offsets[i] }, t + i * per);
        });
        const end = t + h.chars.length * per;
        tl.to(h.caret, { autoAlpha: 0, duration: 0.2 }, end + 0.1);
        return end;
      };
      const fillCard = (tl, j, t) => {
        const h = heads[j];
        tl.to(h.icon, { scale: 1, autoAlpha: 1, duration: 0.4, ease: "back.out(1.8)" }, t);
        tl.fromTo(h.app, { autoAlpha: 0, x: -10 }, { autoAlpha: 1, x: 0, duration: 0.35, ease: "power2.out" }, t + 0.08);
        tl.fromTo(h.time, { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.35 }, t + 0.16);
        return typeIn(tl, h, t + 0.3);
      };

      // ===================== TIMELINE =====================
      const tl = gsap.timeline({ paused: true });

      // blooms drift the whole time, shifting the colour temperature
      tl.fromTo("#bAmber",  { x: -60, y: 40 },  { x: 70, y: -50, duration: 14, ease: "sine.inOut" }, 0);
      tl.fromTo("#bViolet", { x: 60, y: -40 },  { x: -70, y: 50, duration: 14, ease: "sine.inOut" }, 0);

      // phone + home settle in
      tl.fromTo("#phone", { autoAlpha: 0, scale: 0.96 }, { autoAlpha: 1, scale: 1, duration: 0.9, ease: "power3.out" }, 0.2);

      // ---- card 1 slides in from the top, spring-settles ----
      tl.to("#nf0", { y: STACK[0], autoAlpha: 1, duration: 0.85, ease: "back.out(1.5)" }, 0.9);
      let e = fillCard(tl, 0, 1.7);

      // ---- card 2 enters, stacks behind ----
      tl.to("#nf1", { y: STACK[1], autoAlpha: 1, duration: 0.8, ease: "back.out(1.5)" }, 3.4);
      fillCard(tl, 1, 4.0);

      // ---- card 3 enters, stacks behind ----
      tl.to("#nf2", { y: STACK[2], autoAlpha: 1, duration: 0.8, ease: "back.out(1.5)" }, 5.0);
      fillCard(tl, 2, 5.6);

      // hold the perspective stack
      // ---- cursor swipes up; cards fan out into a flat list ----
      tl.to("#cursor", { autoAlpha: 1, x: 1080, y: 1180, duration: 0.5, ease: "power2.out" }, 6.7);
      tl.to("#cursor", { y: 760, duration: 0.5, ease: "power2.in" }, 7.2);        // the upward swipe
      // each card springs to its own row with an individual bounce
      cardEls.forEach((el, j) => {
        tl.to(el, { y: LIST[j], scale: 1, duration: 0.8, ease: "elastic.out(1, 0.6)" }, 7.4 + j * 0.08);
      });
      tl.to("#cursor", { autoAlpha: 0, duration: 0.3 }, 7.8);

      // ---- cursor taps the second card; it expands to reveal more ----
      tl.to("#cursor", { autoAlpha: 1, x: 1080, y: LIST[1] + 460 + 150, duration: 0.5, ease: "power2.out" }, 8.5);
      tl.to("#cursor", { y: "+=26", duration: 0.1, yoyo: true, repeat: 1, ease: "power2.inOut" }, 9.0);   // the tap
      tl.to("#nf1", { height: EXP, duration: 0.55, ease: "back.out(1.4)" }, 9.1);
      tl.to("#nf2", { y: LIST[2] + (EXP - CARD_H), duration: 0.55, ease: "back.out(1.4)" }, 9.1);          // pushed down
      tl.to(heads[1].more, { autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 9.45);
      tl.to("#cursor", { autoAlpha: 0, duration: 0.3 }, 9.5);

      // hold expanded, then collapse back
      tl.to(heads[1].more, { autoAlpha: 0, duration: 0.3 }, 11.4);
      tl.to("#nf1", { height: CARD_H, duration: 0.5, ease: "power3.inOut" }, 11.5);
      tl.to("#nf2", { y: LIST[2], duration: 0.5, ease: "power3.inOut" }, 11.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
