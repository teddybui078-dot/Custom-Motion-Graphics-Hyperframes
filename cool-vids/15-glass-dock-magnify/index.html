<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=3840, height=2160" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 3840px; height: 2160px; overflow: hidden;
        font-family: "Inter", sans-serif; }

      /* deep layered cinematic canvas: #0f0c29 -> #302b63 -> #24243e (radial avoids H.264 banding) */
      .stage { position: absolute; inset: 0; overflow: hidden;
        background:
          radial-gradient(150% 135% at 30% 12%, #302b63 0%, #24243e 46%, #16132b 74%, #0f0c29 100%); }
      .grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.045; mix-blend-mode: overlay;
        background-image: radial-gradient(rgba(255,255,255,0.7) 1px, transparent 1px); background-size: 4px 4px; }

      /* four soft drifting blooms — the colour life behind the glass */
      .blob { position: absolute; border-radius: 50%; filter: blur(170px); will-change: transform; }
      .blob.purple { left: 140px;   top: -340px;    width: 1850px; height: 1850px; background: #8b5cf6; opacity: 0.52; }
      .blob.teal   { right: -260px; bottom: -380px; width: 1700px; height: 1700px; background: #2dd4bf; opacity: 0.40; }
      .blob.coral  { right: 200px;  top: 120px;     width: 1500px; height: 1500px; background: #fb7185; opacity: 0.40; }
      .blob.cyan   { left: 50%;     bottom: -520px; width: 1550px; height: 1550px; background: #38bdf8; opacity: 0.34; margin-left: -775px; }

      /* the frosted dock pill */
      .dock-wrap { position: absolute; left: 50%; top: 1384px; transform: translateX(-50%); }
      .dock { position: relative; display: flex; align-items: center; gap: 48px; padding: 56px;
        border-radius: 112px; overflow: visible;
        background: rgba(255,255,255,0.10);
        backdrop-filter: blur(80px) saturate(165%); -webkit-backdrop-filter: blur(80px) saturate(165%);
        border: 1px solid rgba(255,255,255,0.16);
        box-shadow:
          inset 0 3px 0 rgba(255,255,255,0.45),     /* top rim of caught light */
          inset 3px 0 0 rgba(255,255,255,0.40),     /* left rim of caught light */
          inset 0 -2px 0 rgba(0,0,0,0.20),
          0 70px 150px rgba(8,6,26,0.55),           /* deep drop shadow */
          0 10px 36px rgba(8,6,26,0.42); }

      /* thin frosted divider between icon 5 and 6 */
      .divider { flex: none; width: 3px; height: 176px; align-self: center; border-radius: 3px;
        background: rgba(255,255,255,0.18);
        box-shadow: inset 1px 0 0 rgba(255,255,255,0.35), -1px 0 0 rgba(0,0,0,0.12); }

      /* each app icon: its own glass surface */
      .icon { position: relative; width: 240px; height: 240px; flex: none; transform-origin: 50% 100%; }
      .ic-glass { position: absolute; inset: 0; border-radius: 56px; overflow: hidden;
        backdrop-filter: blur(26px) saturate(150%); -webkit-backdrop-filter: blur(26px) saturate(150%);
        border: 1px solid rgba(255,255,255,0.22);
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.45), inset 2px 0 0 rgba(255,255,255,0.30),
                    inset 0 -3px 8px rgba(0,0,0,0.20), 0 16px 34px rgba(6,5,22,0.42); }
      /* coloured gradient fill seen through the frosting */
      .ic-fill { position: absolute; inset: 0; border-radius: 56px;
        background: linear-gradient(150deg, var(--c1), var(--c2)); opacity: 0.92; }
      /* top-edge specular highlight, upper 45% */
      .ic-spec { position: absolute; left: 0; top: 0; right: 0; height: 45%; border-radius: 56px 56px 40px 40px;
        background: linear-gradient(to bottom, rgba(255,255,255,0.50), rgba(255,255,255,0.06) 70%, transparent); }
      /* hover brighten + extra rim, both start invisible */
      .ic-bright { position: absolute; inset: 0; border-radius: 56px; opacity: 0; pointer-events: none; mix-blend-mode: screen;
        background: radial-gradient(130% 130% at 32% 22%, rgba(255,255,255,0.55), rgba(255,255,255,0.08) 60%, transparent 78%); }
      .ic-rim { position: absolute; inset: 0; border-radius: 56px; opacity: 0; pointer-events: none;
        box-shadow: inset 0 3px 0 rgba(255,255,255,0.85), inset 3px 0 0 rgba(255,255,255,0.6),
                    inset 0 0 28px rgba(255,255,255,0.38); }
      .ic-glyph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
      .ic-glyph svg { width: 120px; height: 120px; stroke: rgba(255,255,255,0.95); fill: none;
        stroke-width: 6.5; stroke-linecap: round; stroke-linejoin: round;
        filter: drop-shadow(0 3px 6px rgba(0,0,0,0.32)); }

      /* "app is open" dots, anchored to the dock (do not lift with icons) */
      .dot { position: absolute; width: 16px; height: 16px; border-radius: 50%; opacity: 0;
        background: rgba(255,255,255,0.85); box-shadow: 0 0 10px rgba(255,255,255,0.35); }

      /* hover label tooltip, anchored to the dock, above the hovered icon */
      .label { position: absolute; opacity: 0; transform: translateX(-50%);
        padding: 18px 34px; border-radius: 22px; white-space: nowrap;
        font-size: 46px; font-weight: 500; letter-spacing: 0.2px; color: #ffffff;
        background: rgba(18,15,38,0.62);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.16);
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.20), 0 20px 44px rgba(6,5,22,0.5); }

      #cursor { position: absolute; left: 0; top: 0; z-index: 90; opacity: 0;
        filter: drop-shadow(0 12px 16px rgba(0,0,0,0.55)); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="3840" data-height="2160">
      <div class="stage" data-layout-allow-overflow>
        <div class="blob purple" id="b-purple"></div>
        <div class="blob teal" id="b-teal"></div>
        <div class="blob coral" id="b-coral"></div>
        <div class="blob cyan" id="b-cyan"></div>

        <div class="dock-wrap" id="dockwrap" data-layout-allow-overflow>
          <div class="dock" id="dock" data-layout-allow-overflow></div>
        </div>

        <div id="cursor">
          <svg width="82" height="96" viewBox="0 0 24 28">
            <path d="M3,2 L3,22 L8.5,16.8 L12,24.5 L15.4,23 L11.9,15.3 L19,15.3 Z"
                  fill="#ffffff" stroke="#1b1b22" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="grain"></div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const $ = (s) => document.querySelector(s);

      const FPS = 30;
      const f = (n) => n / FPS; // frames -> seconds

      // ---------- dock geometry (mirrors the CSS) ----------
      const W = 3840;
      const ICON = 240, GAP = 48, PAD = 56, DIV = 3;
      const N = 8;
      // 9 flex children (8 icons + 1 divider) => 8 gaps
      const DOCK_W = PAD * 2 + N * ICON + N * GAP + DIV;
      const DOCK_LEFT = (W - DOCK_W) / 2;
      const DOCK_TOP = 1384;
      const ICON_CY = DOCK_TOP + PAD + ICON / 2; // 1560 — icon vertical centre at rest
      // x centre of icon i (the divider sits between index 4 and 5)
      const iconCenterX = (i) => {
        let x = DOCK_LEFT + PAD + i * (ICON + GAP);
        if (i >= 5) x += DIV + GAP;
        return x + ICON / 2;
      };
      const localX = (i) => iconCenterX(i) - DOCK_LEFT; // x relative to the dock element

      // ---------- icon content ----------
      const GLYPHS = [
        '<path d="M4 5h16v11H9l-4 4z"/>',                                                            // messages
        '<rect x="4" y="5" width="16" height="15" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/>',          // calendar
        '<rect x="3" y="7" width="18" height="13" rx="3"/><circle cx="12" cy="13.5" r="3.6"/><path d="M8 7l1.6-3h4.8L16 7"/>', // camera
        '<circle cx="7" cy="18" r="2.6"/><circle cx="18" cy="16" r="2.6"/><path d="M9.6 18V5l11-2v11"/>', // music
        '<circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.5 5.5l2.1 2.1M16.4 16.4l2.1 2.1M18.5 5.5l-2.1 2.1M7.6 16.4l-2.1 2.1"/>', // settings
        '<rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3.5 7.5L12 13l8.5-5.5"/>',      // mail
        '<path d="M12 21s7-6.2 7-11a7 7 0 1 0-14 0c0 4.8 7 11 7 11z"/><circle cx="12" cy="10" r="2.6"/>', // maps
        '<rect x="3" y="5" width="18" height="14" rx="3"/><circle cx="9" cy="11" r="2.4"/><path d="M3.5 18l5-4.2 3.5 2.8L16 13l4.5 4"/>', // photos
      ];
      const NAMES = ["Messages", "Calendar", "Camera", "Music", "Settings", "Mail", "Maps", "Photos"];
      // two-stop gradient per icon, drawn from the canvas blob palette
      const FILLS = [
        ["#34d399", "#10b981"], // messages  green
        ["#f87171", "#ef4444"], // calendar  red
        ["#a78bfa", "#7c3aed"], // camera    purple
        ["#fb7185", "#e11d48"], // music     pink
        ["#94a3b8", "#475569"], // settings  slate
        ["#38bdf8", "#0ea5e9"], // mail      sky
        ["#4ade80", "#16a34a"], // maps      green
        ["#fbbf24", "#f59e0b"], // photos    amber
      ];

      // ---------- build the dock ----------
      const dock = $("#dock");
      const icons = [];
      for (let i = 0; i < N; i++) {
        if (i === 5) { // divider before the sixth icon
          const dv = document.createElement("div");
          dv.className = "divider";
          dock.appendChild(dv);
        }
        const el = document.createElement("div");
        el.className = "icon";
        el.id = "icon-" + i;
        el.innerHTML =
          `<div class="ic-glass"></div>` +
          `<div class="ic-fill" style="--c1:${FILLS[i][0]};--c2:${FILLS[i][1]}"></div>` +
          `<div class="ic-spec"></div>` +
          `<div class="ic-bright"></div>` +
          `<div class="ic-rim"></div>` +
          `<div class="ic-glyph"><svg viewBox="0 0 24 24">${GLYPHS[i]}</svg></div>`;
        dock.appendChild(el);
        icons.push(el);
      }
      const brights = icons.map((e) => e.querySelector(".ic-bright"));
      const rims = icons.map((e) => e.querySelector(".ic-rim"));

      // open-app dots, parented to the dock so they ride the entrance but stay put under lifting icons
      const dots = [];
      for (let i = 0; i < N; i++) {
        const d = document.createElement("div");
        d.className = "dot";
        d.style.left = (localX(i) - 8) + "px";
        d.style.top = (PAD * 2 + ICON - 36) + "px"; // inside the bottom padding band
        dock.appendChild(d);
        dots.push(d);
      }

      // hover label tooltips — one pre-built element per hover stop (fully seekable, no TextPlugin)
      const STOP_IDX = [2, 4, 5, 6];
      const labels = {};
      STOP_IDX.forEach((idx) => {
        const lb = document.createElement("div");
        lb.className = "label";
        lb.style.top = "-150px";
        lb.style.left = localX(idx) + "px";
        lb.textContent = NAMES[idx];
        dock.appendChild(lb);
        labels[idx] = lb;
      });

      // ---------- initial states ----------
      gsap.set("#dockwrap", { xPercent: -50, y: 820 });          // start fully below the canvas
      gsap.set(icons, { scale: 0, autoAlpha: 0, transformOrigin: "50% 100%" });
      gsap.set("#cursor", { autoAlpha: 0, x: 70, y: ICON_CY + 70 }); // left edge of canvas
      gsap.set(dots, { autoAlpha: 0 });
      gsap.set(Object.values(labels), { autoAlpha: 0 });

      // ===================== TIMELINE =====================
      const tl = gsap.timeline({ paused: true });

      // --- four blooms drift imperceptibly across the whole 15s ---
      tl.fromTo("#b-purple", { x: -50, y: -40 }, { x: 80,  y: 60,  duration: 15, ease: "sine.inOut" }, 0);
      tl.fromTo("#b-teal",   { x: 60,  y: 50 },  { x: -70, y: -50, duration: 15, ease: "sine.inOut" }, 0);
      tl.fromTo("#b-coral",  { x: 30,  y: -60 }, { x: -60, y: 70,  duration: 15, ease: "sine.inOut" }, 0);
      tl.fromTo("#b-cyan",   { x: -40, y: 40 },  { x: 60,  y: -40, duration: 15, ease: "sine.inOut" }, 0);

      // --- dock springs up from below: overshoot 10px, two damped oscillations, settle ---
      let t = 0.3;
      tl.to("#dockwrap", { y: -14, duration: 0.60, ease: "power3.out" }, t);          // rise + overshoot up
      tl.to("#dockwrap", { y: 8,   duration: 0.20, ease: "sine.inOut" }, t + 0.60);   // bounce 1 down
      tl.to("#dockwrap", { y: -4,  duration: 0.16, ease: "sine.inOut" }, t + 0.80);   // bounce 2 up
      tl.to("#dockwrap", { y: 0,   duration: 0.14, ease: "sine.inOut" }, t + 0.96);   // settle
      const docked = t + 1.1; // ~1.4s

      // --- icons pop in L->R, 6 frames apart, spring 0 -> 1.06 -> 1.0 ---
      const popStart = docked + 0.15;
      const step = f(6);
      icons.forEach((el, i) => {
        const ts = popStart + i * step;
        tl.to(el, { autoAlpha: 1, duration: 0.10 }, ts);
        tl.to(el, { scale: 1.06, duration: 0.20, ease: "power3.out" }, ts);
        tl.to(el, { scale: 1.0,  duration: 0.30, ease: "elastic.out(1, 0.55)" }, ts + 0.20);
        tl.to(dots[i], { autoAlpha: 1, duration: 0.30, ease: "power2.out" }, ts + 0.18);
      });
      const allPlaced = popStart + (N - 1) * step + 0.5; // ~3.0s — within 1.5s of landing

      // --- cursor materialises at the left edge and drifts toward the dock ---
      const curIn = allPlaced + 0.3; // ~3.3s
      tl.to("#cursor", { autoAlpha: 1, duration: 0.3, overwrite: "auto" }, curIn);

      // --- dock senses the approach: white tint 10% -> 14%, top rim sharpens ---
      tl.to("#dock", {
        backgroundColor: "rgba(255,255,255,0.14)",
        duration: 0.9, ease: "power2.out", overwrite: "auto",
      }, curIn + 0.1);

      // ---------- magnification engine ----------
      // distance falloff: d0 lift -96/1.32, d1 -44/1.15, d2 -18/1.06, d3+ rest
      function focusAt(c, time) {
        for (let i = 0; i < N; i++) {
          const d = Math.abs(i - c);
          let sc = 1.0, yy = 0, br = 0;
          if (d === 0) { sc = 1.32; yy = -96; br = 1.0; }
          else if (d === 1) { sc = 1.15; yy = -44; br = 0.42; }
          else if (d === 2) { sc = 1.06; yy = -18; br = 0.14; }
          const ease = d === 0 ? "back.out(2.6)" : d === 1 ? "back.out(1.8)" : "power3.out";
          tl.to(icons[i], { scale: sc, y: yy, duration: 0.40, ease }, time + (d === 0 ? 0 : 0.03));
          tl.to(brights[i], { autoAlpha: br, duration: 0.36, ease: "power2.out" }, time);
          tl.to(rims[i], { autoAlpha: i === c ? 0.5 : 0, duration: 0.32 }, time);
        }
        // rim flash on the hovered icon: spike to 65% for ~3 frames, settle to 50%
        tl.to(rims[c], { autoAlpha: 0.85, duration: 0.06 }, time);
        tl.to(rims[c], { autoAlpha: 0.5,  duration: f(3) }, time + 0.06);
      }

      // hover stops: third, fifth, sixth, seventh icon (0-based 2,4,5,6)
      const stops = [
        { idx: 2, arrive: curIn + 1.3 },  // ~4.6s
        { idx: 4, arrive: curIn + 3.0 },  // ~6.3s
        { idx: 5, arrive: curIn + 4.6 },  // ~7.9s
        { idx: 6, arrive: curIn + 6.2 },  // ~9.5s
      ];

      // cursor travel + magnification handoff per stop
      let prevX = 70, prevY = ICON_CY + 70;
      stops.forEach((s, k) => {
        const tx = iconCenterX(s.idx) - 6;     // tip lands just left of icon centre
        const ty = ICON_CY + 22;
        const move = k === 0 ? 1.0 : 0.62;
        const startMove = s.arrive - move;
        // a slightly curved, human path: ease through a midpoint bow
        const bowY = (prevY + ty) / 2 - 26;
        tl.to("#cursor", { x: (prevX + tx) / 2, y: bowY, duration: move * 0.5, ease: "sine.in" }, startMove);
        tl.to("#cursor", { x: tx, y: ty, duration: move * 0.5, ease: "sine.out" }, startMove + move * 0.5);
        prevX = tx; prevY = ty;

        // magnification wave follows the cursor onto the new icon
        focusAt(s.idx, s.arrive);

        // label: previous fades as icons descend, new fades in as the icon peaks
        if (k > 0) tl.to(labels[stops[k - 1].idx], { autoAlpha: 0, duration: 0.13 }, s.arrive - 0.04);
        tl.to(labels[s.idx], { autoAlpha: 1, duration: f(8), ease: "power2.out" }, s.arrive + 0.05);
      });

      // --- cursor lifts away from the dock; every icon settles to rest ---
      const leave = stops[stops.length - 1].arrive + 1.5; // ~11.0s
      const lastIdx = stops[stops.length - 1].idx;
      // staggered settle: least-magnified first, the hovered icon last
      for (let i = 0; i < N; i++) {
        const d = Math.abs(i - lastIdx);
        const delay = d >= 3 ? 0 : d === 2 ? 0.05 : d === 1 ? 0.10 : 0.16;
        const dur = d === 0 ? 0.6 : d === 1 ? 0.5 : 0.42;
        tl.to(icons[i], { scale: 1, y: 0, duration: dur, ease: "power3.out" }, leave + delay);
        tl.to(brights[i], { autoAlpha: 0, duration: 0.4 }, leave + delay);
      }
      tl.to(rims[lastIdx], { autoAlpha: 0, duration: 0.4 }, leave);
      tl.to(labels[lastIdx], { autoAlpha: 0, duration: 0.2 }, leave);
      // cursor drifts upward off the dock surface, then fades
      tl.to("#cursor", { x: prevX + 60, y: ICON_CY - 360, duration: 0.9, ease: "power2.inOut" }, leave + 0.05);
      tl.to("#cursor", { autoAlpha: 0, duration: 0.5, ease: "power2.in" }, leave + 0.7);

      // --- dock dims back to rest; holds still while the blooms keep drifting beneath it ---
      tl.to("#dock", { backgroundColor: "rgba(255,255,255,0.10)", duration: 0.9, ease: "power2.inOut" }, leave + 0.3);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
