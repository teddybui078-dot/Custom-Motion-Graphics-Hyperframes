<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden; background: #ffffff;
        font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .stage { position: absolute; inset: 0; overflow: hidden; background: #ffffff; }
      #world { position: absolute; inset: 0; transform-origin: 960px 540px; }

      #branchsvg, #returnsvg { position: absolute; inset: 0; }
      #branchsvg path { fill: none; stroke: #1D9E75; stroke-width: 5; stroke-linecap: round; }
      #returnsvg path { fill: none; stroke: #1D9E75; stroke-width: 2.4; stroke-linecap: round; }

      .glow {
        position: absolute; left: 960px; top: 560px; width: 40px; height: 40px;
        margin: -20px 0 0 -20px; border-radius: 50%;
        background: radial-gradient(circle, rgba(29,158,117,0.45) 0%, rgba(29,158,117,0) 70%);
      }

      #bankScale { position: absolute; left: 960px; top: 540px; transform-origin: 50% 100%; }
      #bankSquash { transform-origin: 50% 100%; }
      .bank { width: 280px; height: 300px; margin: -300px 0 0 -140px; }
      #dollar {
        position: absolute; left: 0; top: -188px; width: 280px; margin-left: -140px;
        text-align: center; font-size: 96px; font-weight: 800; color: #ffffff; line-height: 1;
      }

      .node {
        position: absolute; width: 72px; height: 72px; margin: -36px 0 0 -36px;
        border-radius: 18px; background: #ffffff; border: 2px solid #1D9E75;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
        box-shadow: 0 8px 18px -6px rgba(29,158,117,0.35);
      }
      .node .ni { width: 24px; height: 24px; border-radius: 7px; background: #1D9E75; }
      .node .nl { font-size: 12.5px; font-weight: 700; color: #137a59; letter-spacing: -0.2px; }
      .node .nbevel { position: absolute; inset: 0; border-radius: 18px; box-shadow: inset 1.5px 1.5px 0 0 #ffffff; opacity: 0.2; pointer-events: none; }
      .node .nnum { position: absolute; right: -8px; top: -10px; min-width: 22px; height: 22px; padding: 0 5px; border-radius: 11px; background: #1D9E75; color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

      .bill {
        position: absolute; left: 0; top: 0; width: 60px; height: 36px; margin: -18px 0 0 -30px;
        border-radius: 6px; background: #1faf7e; border: 3px solid #137a59;
        display: flex; align-items: center; justify-content: center; color: #eafff5; font-weight: 800; font-size: 19px;
        box-shadow: 0 4px 10px rgba(20,90,60,0.25);
      }
      .packet {
        position: absolute; left: 0; top: 0; width: 30px; height: 18px; margin: -9px 0 0 -15px;
        border-radius: 4px; background: #1D9E75; box-shadow: 0 0 0 1px #157a59;
      }
      .packet.ret { width: 40px; height: 26px; margin: -13px 0 0 -20px; background: #16b886; box-shadow: 0 0 0 1px #0e7a59, 0 0 14px rgba(22,184,134,0.6); }

      #pct {
        position: absolute; left: 960px; top: 175px; transform: translateX(-50%);
        font-size: 96px; font-weight: 800; color: #1D9E75; letter-spacing: -2px; white-space: nowrap;
        text-shadow: 0 6px 22px rgba(29,158,117,0.35);
      }

      .ring { position: absolute; left: 0; top: 0; width: 20px; height: 20px; margin: -10px 0 0 -10px; border-radius: 50%; border: 3px solid #1D9E75; opacity: 0; }
      .ring.white { border-color: rgba(255,255,255,0.9); }

      #flash { position: absolute; inset: 0; background: #ffffff; opacity: 0; z-index: 60; pointer-events: none; }
      #finaltext {
        position: absolute; left: 0; right: 0; bottom: 96px; text-align: center; z-index: 70;
        font-size: 32px; font-weight: 700; color: #1D9E75; letter-spacing: 6px; opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="20" data-width="1920" data-height="1080">
      <div class="stage">
        <div id="world" data-layout-allow-overflow>
          <svg id="branchsvg" viewBox="0 0 1920 1080"></svg>
          <svg id="returnsvg" viewBox="0 0 1920 1080"></svg>
          <div class="glow" id="glow" style="opacity:0"></div>
          <div id="ringpool"></div>
          <div id="bankScale">
            <div id="bankSquash">
              <svg class="bank" viewBox="0 0 240 260">
                <polygon points="120,8 18,72 222,72" fill="#1D9E75"/>
                <rect x="22" y="72" width="196" height="18" fill="#1D9E75"/>
                <rect x="30" y="92" width="22" height="118" fill="#1D9E75"/>
                <rect x="76" y="92" width="22" height="118" fill="#1D9E75"/>
                <rect x="122" y="92" width="22" height="118" fill="#1D9E75"/>
                <rect x="168" y="92" width="22" height="118" fill="#1D9E75"/>
                <rect x="14" y="210" width="212" height="20" fill="#1D9E75"/>
                <rect x="6" y="232" width="228" height="16" fill="#1D9E75"/>
                <rect x="40" y="104" width="160" height="14" fill="#ffffff" opacity="0.9"/>
              </svg>
              <div id="dollar" style="opacity:0">$</div>
            </div>
          </div>
          <div id="nodes"></div>
          <div id="bills"></div>
          <div id="packets"></div>
          <div id="pct" style="opacity:0">+12%</div>
        </div>
        <div id="flash"></div>
        <div id="finaltext">CAPITAL FLOWS WHERE IT GROWS</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const FR = 1 / 30;
      const G = "#1D9E75";
      const CX = 960, CY = 540; // bank base anchor (bank base sits at ~ y560)
      const BASE = { x: 960, y: 560 };
      const tl = gsap.timeline({ paused: true });
      const $ = (id) => document.getElementById(id);
      const NS = "http://www.w3.org/2000/svg";
      const rnd = (i, m) => ((i * 9301 + 49297) % 233280) / 233280 * (m || 1); // deterministic

      // ---------- ring pool for shockwaves ----------
      const rings = [];
      for (let i = 0; i < 80; i++) {
        const r = document.createElement("div");
        r.className = "ring";
        $("ringpool").appendChild(r);
        rings.push(r);
      }
      let ringI = 0;
      function shock(x, y, at, r1, frames, white, thick) {
        const r = rings[ringI++ % rings.length];
        gsap.set(r, { left: x, top: y, borderWidth: thick || 3, width: 20, height: 20, margin: "-10px 0 0 -10px" });
        if (white) r.classList.add("white"); else r.classList.remove("white");
        tl.set(r, { scale: 1, opacity: 0.9 }, at);
        tl.to(r, { scale: r1 / 10, opacity: 0, duration: frames * FR, ease: "power2.out" }, at);
      }

      // ---------- white flash ----------
      function flash(at, peak, holdF, fadeF) {
        tl.to($("flash"), { opacity: peak, duration: FR, ease: "none" }, at);
        tl.to($("flash"), { opacity: 0, duration: fadeF * FR, ease: "power2.out" }, at + (holdF || 1) * FR);
      }

      // ---------- canvas snap (shake #world) ----------
      function snap(dx, dy, at, frames) {
        tl.to("#world", { keyframes: [
          { x: dx, y: dy, duration: FR, ease: "none" },
          { x: 0, y: 0, duration: (frames - 1) * FR, ease: "power2.out" },
        ] }, at);
      }

      // ---------- chromatic aberration flash (set on, hard off) ----------
      function chroma(sel, at, px, frames) {
        tl.set(sel, { filter: `drop-shadow(${px}px 0 0 rgba(255,30,90,0.55)) drop-shadow(-${px}px 0 0 rgba(0,190,255,0.55))` }, at);
        tl.set(sel, { filter: "none" }, at + frames * FR);
      }

      // ---------- squash + bounce settle on the bank (inner squash layer) ----------
      function squashBounce(at, sx, sy, osc2) {
        const k2 = osc2 == null ? 0.5 : osc2;
        tl.to("#bankSquash", { keyframes: [
          { scaleX: sx, scaleY: sy, duration: 2 * FR, ease: "power2.out" },
          { scaleX: 1 - (sx - 1) * 0.6, scaleY: 1 - (sy - 1) * 0.6, duration: 4 * FR, ease: "sine.inOut" },
          { scaleX: 1 + (sx - 1) * 0.3 * k2, scaleY: 1 + (sy - 1) * 0.3 * k2, duration: 4 * FR, ease: "sine.inOut" },
          { scaleX: 1, scaleY: 1, duration: 4 * FR, ease: "sine.inOut" },
        ] }, at);
      }

      // ===========================================================
      // geometry: branch endpoints + curved paths
      // ===========================================================
      const EP = [
        { x: 250, y: 250, lbl: "Angel" },
        { x: 745, y: 130, lbl: "Seed" },
        { x: 1175, y: 130, lbl: "VC" },
        { x: 1670, y: 250, lbl: "Fund" },
        { x: 250, y: 835, lbl: "Index" },
        { x: 745, y: 955, lbl: "Pension" },
        { x: 1175, y: 955, lbl: "Crypto" },
        { x: 1670, y: 835, lbl: "Family" },
      ];
      const RETURN_IDX = [1, 2, 5, 6]; // the four "largest" investors that send interest back

      // build curved branch paths from base to each endpoint
      const branchSvg = $("branchsvg");
      const paths = EP.map((e, i) => {
        const mx = (BASE.x + e.x) / 2, my = (BASE.y + e.y) / 2;
        const nx = -(e.y - BASE.y), ny = e.x - BASE.x; // perpendicular
        const len = Math.hypot(nx, ny) || 1;
        const wob = (rnd(i + 3) - 0.5) * 220; // organic offset
        const c1x = BASE.x + (mx - BASE.x) * 0.5 + (nx / len) * wob * 0.6;
        const c1y = BASE.y + (my - BASE.y) * 0.5 + (ny / len) * wob * 0.6;
        const c2x = mx + (nx / len) * wob;
        const c2y = my + (ny / len) * wob;
        const d = `M ${BASE.x} ${BASE.y} C ${c1x} ${c1y} ${c2x} ${c2y} ${e.x} ${e.y}`;
        const p = document.createElementNS(NS, "path");
        p.setAttribute("d", d);
        branchSvg.appendChild(p);
        return p;
      });
      const plens = paths.map((p) => p.getTotalLength());

      function pathKeys(p, fromT, toT, dur, N) {
        N = N || 22;
        const L = p.getTotalLength();
        const keys = [];
        for (let k = 1; k <= N; k++) {
          const t = fromT + (toT - fromT) * (k / N);
          const pt = p.getPointAtLength(L * t);
          keys.push({ x: pt.x, y: pt.y, duration: dur / N, ease: k === 1 ? "power1.in" : k === N ? "power1.out" : "none" });
        }
        return keys;
      }

      // initial branch dash (hidden, to be drawn)
      paths.forEach((p, i) => {
        const L = plens[i];
        gsap.set(p, { strokeDasharray: L, strokeDashoffset: L, autoAlpha: 1 });
      });

      // ---------- build investor nodes ----------
      const nodeEls = EP.map((e, i) => {
        const n = document.createElement("div");
        n.className = "node";
        n.style.left = e.x + "px";
        n.style.top = e.y + "px";
        n.innerHTML = `<div class="nbevel"></div><div class="ni"></div><div class="nl">${e.lbl}</div><div class="nnum" style="opacity:0">+0</div>`;
        $("nodes").appendChild(n);
        return n;
      });

      // ---------- build money-stream bills (3 rivers) ----------
      const streams = [
        { ox: -120, oy: 470, cx: 760, cy: 560 }, // from left
        { ox: 2040, oy: 470, cx: 1160, cy: 560 }, // from right
        { ox: 960, oy: -120, cx: 960, cy: 360 }, // from top
      ];
      const PER = 20;
      const bills = [];
      streams.forEach((s, si) => {
        for (let j = 0; j < PER; j++) {
          const b = document.createElement("div");
          b.className = "bill";
          b.textContent = j % 4 === 0 ? "¢" : "$";
          $("bills").appendChild(b);
          bills.push({ el: b, s, si, j });
        }
      });

      // =====================================================================
      //  SECOND 0–1 : stillness, then the bank DROPS in
      // =====================================================================
      gsap.set("#bankScale", { scale: 1, autoAlpha: 0 });
      gsap.set("#bankSquash", { scaleX: 1, scaleY: 1 });
      gsap.set("#bankScale", { y: -780 }); // start off-canvas above
      nodeEls.forEach((n) => gsap.set(n, { scale: 0, autoAlpha: 0, transformOrigin: "50% 50%" }));
      bills.forEach((b) => gsap.set(b.el, { autoAlpha: 0 }));

      const DROP = 1.0;
      tl.set("#bankScale", { autoAlpha: 1 }, DROP);
      // fall with motion blur (vertical stretch), then land
      tl.to("#bankScale", { keyframes: [
        { y: -40, scaleY: 1.18, scaleX: 0.94, duration: 7 * FR, ease: "power2.in" },
        { y: 0, scaleY: 1, scaleX: 1, duration: 1 * FR, ease: "none" },
      ] }, DROP);
      const HIT = DROP + 8 * FR; // landing frame
      flash(HIT, 0.85, 2, 4);
      shock(BASE.x, BASE.y, HIT, 1100, 8, false, 4);
      snap(0, 6, HIT, 4);
      chroma("#bankSquash", HIT, 4, 3);
      squashBounce(HIT, 1.08, 0.86, 0.6); // compress 14% vert, stretch 8% horiz, 2 bounces

      // =====================================================================
      //  SECONDS 2–5 : money arrives from three directions
      // =====================================================================
      const MSTART = 2.0, MHIT = 2.55;
      bills.forEach((b) => {
        const { s, j, si } = b;
        const perp = rnd(si * PER + j + 1) - 0.5; // across-stream spread (thickness)
        const along = rnd(si * PER + j + 41) - 0.5; // along-stream jitter
        // perpendicular to the stream's travel direction → a fat directed river
        const dirx = s.cx - s.ox, diry = s.cy - s.oy, dl = Math.hypot(dirx, diry) || 1;
        const px = -diry / dl, py = dirx / dl;
        const sx = s.ox + px * perp * 150 + (dirx / dl) * along * 120;
        const sy = s.oy + py * perp * 150 + (diry / dl) * along * 120;
        const ex = s.cx + px * perp * 90, ey = s.cy + py * perp * 90;
        const rot = (rnd(si * PER + j + 7) - 0.5) * 200;
        const t0 = MSTART + j * 0.022; // launches 2.00 → 2.42
        const dur = MHIT - t0; // every bill lands on the impact frame → converging river
        gsap.set(b.el, { x: sx, y: sy, rotation: rot, scale: 0.88 + perp * 0.25 });
        tl.set(b.el, { autoAlpha: 1 }, t0);
        tl.to(b.el, { x: ex, y: ey, rotation: rot + (along) * 160, duration: dur, ease: "none", filter: "blur(1.5px)" }, t0);
        tl.to(b.el, { autoAlpha: 0, scale: 0.3, duration: 3 * FR, ease: "power2.in" }, MHIT);
      });
      // triple impact
      flash(MHIT, 1.0, 3, 5);
      shock(760, 560, MHIT, 1300, 11, false, 5);
      shock(1160, 560, MHIT, 1300, 11, false, 5);
      shock(960, 380, MHIT, 1300, 11, false, 5);
      snap(0, 5, MHIT, 3);
      chroma("#bankSquash", MHIT, 5, 4);
      // full-body squash through two oscillations
      tl.to("#bankSquash", { keyframes: [
        { scaleX: 1.16, scaleY: 0.74, duration: 2 * FR, ease: "power2.out" },
        { scaleX: 0.9, scaleY: 1.14, duration: 4 * FR, ease: "sine.inOut" },
        { scaleX: 1.06, scaleY: 0.95, duration: 4 * FR, ease: "sine.inOut" },
        { scaleX: 0.98, scaleY: 1.02, duration: 4 * FR, ease: "sine.inOut" },
        { scaleX: 1, scaleY: 1, duration: 4 * FR, ease: "sine.inOut" },
      ] }, MHIT);

      // the bank pulses twice (deep green glow) and grows 8%
      function pulse(at, dur, peak) {
        tl.fromTo("#glow", { opacity: 0, scale: 1 }, { opacity: peak, scale: 18, duration: dur * 0.45, ease: "power1.out" }, at);
        tl.to("#glow", { opacity: 0, scale: 26, duration: dur * 0.55, ease: "power1.in" }, at + dur * 0.45);
      }
      pulse(3.05, 0.7, 0.8);
      pulse(3.95, 0.8, 0.95);
      tl.to("#bankScale", { scale: 1.08, duration: 0.6, ease: "power2.out" }, 4.05); // grew from feeding
      let bankScale = 1.08;

      // dollar sign springs onto the building face
      gsap.set("#dollar", { scale: 0, transformOrigin: "50% 50%" });
      tl.to("#dollar", { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(2.4)" }, 4.5);

      // =====================================================================
      //  SECONDS 5–10 : the tree branches out + investor nodes detonate
      // =====================================================================
      const BR = 5.0;
      paths.forEach((p, i) => {
        tl.to(p, { strokeDashoffset: 0, duration: 1.0, ease: "power3.out" }, BR + i * 0.02);
      });
      // nodes detonate in a tight cascade (6 frames apart) as branches finish
      const NODE0 = 6.4, NSTEP = 6 * FR;
      EP.forEach((e, i) => {
        const at = NODE0 + i * NSTEP;
        const n = nodeEls[i];
        gsap.set(n, { y: -16 });
        tl.set(n, { autoAlpha: 1 }, at);
        tl.to(n, { y: 0, scale: 1, duration: 4 * FR, ease: "power2.out" }, at);
        // mini cinematic hit
        flash(at + 3 * FR, 0.4, 1, 3);
        shock(e.x, e.y, at + 3 * FR, 150, 7, false, 3);
        tl.to(n, { keyframes: [
          { scaleX: 1.18, scaleY: 0.84, duration: 2 * FR, ease: "power2.out" },
          { scaleX: 0.94, scaleY: 1.06, duration: 3 * FR, ease: "sine.inOut" },
          { scaleX: 1, scaleY: 1, duration: 3 * FR, ease: "sine.inOut" },
        ] }, at + 3 * FR);
        // bevel flash to 60% then settle
        const bv = n.querySelector(".nbevel");
        tl.set(bv, { opacity: 0.6 }, at + 3 * FR);
        tl.to(bv, { opacity: 0.2, duration: 8 * FR, ease: "power1.out" }, at + 4 * FR);
      });

      // =====================================================================
      //  SECONDS 10–14 : money routes out to investors (staggered impacts)
      // =====================================================================
      const ROUTE = 10.0, SPEED = 620; // px/sec → constant speed, branch length sets arrival
      const nums = [3, 8, 12, 6, 4, 5, 9, 7]; // capital received per node
      EP.forEach((e, i) => {
        const dur = plens[i] / SPEED;
        const pk = document.createElement("div");
        pk.className = "packet";
        $("packets").appendChild(pk);
        gsap.set(pk, { x: BASE.x, y: BASE.y, autoAlpha: 0 });
        tl.set(pk, { autoAlpha: 1 }, ROUTE);
        tl.to(pk, { keyframes: pathKeys(paths[i], 0, 1, dur, 22), filter: "blur(1.5px)" }, ROUTE);
        const arr = ROUTE + dur;
        tl.to(pk, { autoAlpha: 0, duration: 2 * FR }, arr);
        // impact on node
        flash(arr, 0.45, 1, 3);
        shock(e.x, e.y, arr, 170, 7, false, 3);
        const n = nodeEls[i];
        tl.to(n, { keyframes: [
          { scaleX: 1.16, scaleY: 0.86, duration: 2 * FR, ease: "power2.out" },
          { scaleX: 0.95, scaleY: 1.05, duration: 3 * FR, ease: "sine.inOut" },
          { scaleX: 1, scaleY: 1, duration: 3 * FR, ease: "sine.inOut" },
        ] }, arr);
        const bv = n.querySelector(".nbevel");
        tl.set(bv, { opacity: 0.6 }, arr);
        tl.to(bv, { opacity: 0.2, duration: 7 * FR, ease: "power1.out" }, arr + FR);
        // node glow pulse + capital number
        const nn = n.querySelector(".nnum");
        nn.textContent = "+" + nums[i];
        tl.fromTo(nn, { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 5 * FR, ease: "back.out(2.2)" }, arr + 2 * FR);
        // the four largest grow slightly bigger
        if (RETURN_IDX.includes(i)) tl.to(n, { scale: 1.18, duration: 0.4, ease: "power2.out" }, arr + 4 * FR);
      });

      // =====================================================================
      //  SECONDS 14–18 : loans go out, interest comes back
      // =====================================================================
      const returnSvg = $("returnsvg");
      const RET = 14.0;
      const retPaths = RETURN_IDX.map((idx, k) => {
        const p = document.createElementNS(NS, "path");
        p.setAttribute("d", paths[idx].getAttribute("d"));
        p.setAttribute("stroke-dasharray", "10 9");
        returnSvg.appendChild(p);
        const L = p.getTotalLength();
        // grow from investor → bank (reverse draw)
        gsap.set(p, { strokeDasharray: L, strokeDashoffset: -L, autoAlpha: 0 });
        tl.set(p, { autoAlpha: 1 }, RET);
        tl.to(p, { strokeDashoffset: 0, duration: 1.0, ease: "power2.out" }, RET);
        // then switch to dashed flowing toward bank
        tl.set(p, { strokeDasharray: "10 9" }, RET + 1.0);
        tl.to(p, { strokeDashoffset: -190, duration: 3.0, ease: "none" }, RET + 1.0);
        return { p, idx, L };
      });

      // fatter return packets travel back to the bank, staggered; bank grows each hit
      const retLaunch = RET + 1.05;
      RETURN_IDX.forEach((idx, k) => {
        const dur = plens[idx] / 560;
        const pk = document.createElement("div");
        pk.className = "packet ret";
        $("packets").appendChild(pk);
        const startAt = retLaunch + k * 0.42;
        gsap.set(pk, { x: EP[idx].x, y: EP[idx].y, autoAlpha: 0 });
        tl.set(pk, { autoAlpha: 1 }, startAt);
        tl.to(pk, { keyframes: pathKeys(paths[idx], 1, 0, dur, 22), filter: "blur(2.5px)" }, startAt);
        const arr = startAt + dur;
        tl.to(pk, { autoAlpha: 0, scale: 0.4, duration: 2 * FR }, arr);
        // full cinematic impact on the bank
        flash(arr, 0.7, 2, 4);
        shock(BASE.x, BASE.y, arr, 900, 10, false, 4);
        snap(0, 5, arr, 4);
        chroma("#bankSquash", arr, 4, 3);
        tl.to("#bankSquash", { keyframes: [
          { scaleX: 1.1, scaleY: 0.9, duration: 2 * FR, ease: "power2.out" },
          { scaleX: 0.97, scaleY: 1.03, duration: 3 * FR, ease: "sine.inOut" },
          { scaleX: 1, scaleY: 1, duration: 3 * FR, ease: "sine.inOut" },
        ] }, arr);
        bankScale += 0.035; // inflate
        tl.to("#bankScale", { scale: bankScale, duration: 0.35, ease: "power2.out" }, arr);
        // percentage flag springs in after the 2nd return hit
        if (k === 1) {
          gsap.set("#pct", { scale: 0, transformOrigin: "50% 100%" });
          tl.to("#pct", { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(2.2)" }, arr + 3 * FR);
        }
        // pct pulses with each landing AFTER it has sprung in (avoids overlapping its entrance)
        if (k >= 2) tl.fromTo("#pct", { scale: 1 }, { scale: 1.08, duration: 4 * FR, yoyo: true, repeat: 1, ease: "sine.inOut", overwrite: "auto" }, arr);
      });

      // =====================================================================
      //  SECONDS 18–20 : hold, slow pull-back, final text
      // =====================================================================
      tl.to("#world", { scale: 0.34, duration: 2.0, ease: "power2.inOut" }, 18.0);
      tl.to("#finaltext", { opacity: 1, duration: 0.6, ease: "power1.out" }, 19.3);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
