<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #ffffff;
        font-family: "Inter", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        color: #0f1115;
      }
      .stage { position: absolute; inset: 0; overflow: hidden; }

      /* ---------- phone frame (minimal chrome) ---------- */
      .phone {
        position: absolute;
        left: 730px;
        top: 70px;
        width: 460px;
        height: 940px;
        background: #0b0b0d;
        border: 12px solid #0b0b0d;
        border-radius: 62px;
        box-shadow: 0 40px 90px -30px rgba(16, 17, 21, 0.35);
      }
      .screen {
        position: absolute;
        inset: 0;
        border-radius: 50px;
        overflow: hidden;
        background: #000000;
      }

      /* ---------- splash (black) + logo ---------- */
      .splash {
        position: absolute;
        inset: 0;
        background: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5;
      }
      .logo {
        width: 108px;
        height: 108px;
        border-radius: 26px;
        background: linear-gradient(140deg, #6366f1, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 14px 40px -8px rgba(99, 102, 241, 0.7);
      }

      /* ---------- home screen ---------- */
      .home {
        position: absolute;
        inset: 0;
        background: #f6f7f9;
        border-radius: 50px;
      }
      .statusbar {
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 30px;
        font-size: 15px;
        font-weight: 640;
        color: #0f1115;
      }
      .statusbar .ind { display: flex; gap: 7px; align-items: center; }
      .statusbar .ind i { display: block; width: 17px; height: 12px; border-radius: 2px; background: #0f1115; }

      .content { padding: 14px 22px 0; }
      .greeting .sm { font-size: 16px; color: #6b7280; font-weight: 540; }
      .greeting .lg { font-size: 30px; font-weight: 720; letter-spacing: -0.6px; margin-top: 3px; }
      .greeting .sub { font-size: 15px; color: #8a90a0; margin-top: 6px; font-weight: 500; }

      .card { border-radius: 20px; margin-top: 18px; }
      .card.hero {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: #fff;
        padding: 22px 24px;
        box-shadow: 0 16px 34px -14px rgba(79, 70, 229, 0.6);
      }
      .card.hero .k { font-size: 14.5px; opacity: 0.85; font-weight: 560; }
      .card.hero .v { font-size: 38px; font-weight: 740; letter-spacing: -1px; margin-top: 8px; }
      .card.hero .r { display: flex; gap: 10px; margin-top: 18px; }
      .card.hero .pill { background: rgba(255,255,255,0.18); border-radius: 10px; height: 34px; flex: 1; display: flex; align-items: center; justify-content: center; font-size: 13.5px; font-weight: 600; }

      .card.row {
        background: #ffffff;
        padding: 18px;
        display: flex;
        align-items: center;
        gap: 15px;
        border: 1px solid #eef0f3;
      }
      .card.row .ic { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; }
      .card.row .ic.a { background: #e7edff; }
      .card.row .ic.b { background: #e6f6ec; }
      .card.row .t { flex: 1; }
      .card.row .t b { font-size: 16px; font-weight: 620; }
      .card.row .t span { display: block; font-size: 13.5px; color: #9ca3af; margin-top: 3px; font-weight: 500; }
      .card.row .amt { font-size: 16px; font-weight: 680; }

      .navbar {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        height: 84px;
        background: #ffffff;
        border-top: 1px solid #eef0f3;
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding-bottom: 14px;
      }
      .navicon { width: 30px; height: 30px; border-radius: 9px; background: #c3c8d2; }
      .navicon.active { background: #4f46e5; }
      .homebar { position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%); width: 120px; height: 5px; border-radius: 3px; background: #0f1115; opacity: 0.25; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <div class="stage">
        <div class="phone" id="phone">
          <div class="screen">
            <!-- home screen (revealed after the splash fades) -->
            <div class="home">
              <div class="statusbar">
                <span>9:41</span>
                <span class="ind"><i></i><i></i><i></i></span>
              </div>
              <div class="content">
                <div class="greeting" id="s-greeting">
                  <div class="sm">Good morning</div>
                  <div class="lg">Hi, Alex 👋</div>
                  <div class="sub">You have 3 tasks today</div>
                </div>
                <div class="card hero" id="s-card1">
                  <div class="k">Total balance</div>
                  <div class="v">$4,820.50</div>
                  <div class="r"><div class="pill">Send</div><div class="pill">Request</div><div class="pill">Top up</div></div>
                </div>
                <div class="card row" id="s-card2">
                  <div class="ic a"></div>
                  <div class="t"><b>Spotify</b><span>Subscription · today</span></div>
                  <div class="amt">- $9.99</div>
                </div>
                <div class="card row" id="s-card3">
                  <div class="ic b"></div>
                  <div class="t"><b>Payday</b><span>Acme Inc · yesterday</span></div>
                  <div class="amt">+ $3,200</div>
                </div>
              </div>
              <div class="navbar" id="s-navbar">
                <div class="navicon active"></div>
                <div class="navicon"></div>
                <div class="navicon"></div>
                <div class="navicon"></div>
              </div>
              <div class="homebar"></div>
            </div>

            <!-- black splash with the loading logo, on top -->
            <div class="splash" id="splash">
              <div class="logo" id="logo">
                <svg width="56" height="56" viewBox="0 0 24 24"><path d="M12 1.5 L14.2 9.8 L22.5 12 L14.2 14.2 L12 22.5 L9.8 14.2 L1.5 12 L9.8 9.8 Z" fill="#ffffff" /></svg>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ---------- initial states ----------
      gsap.set("#phone", { autoAlpha: 0 });
      gsap.set("#splash", { autoAlpha: 1 });
      gsap.set("#logo", { autoAlpha: 0, scale: 0.9, transformOrigin: "50% 50%" });
      const sections = ["#s-greeting", "#s-card1", "#s-card2", "#s-card3", "#s-navbar"];
      gsap.set(sections, { autoAlpha: 0, y: 24 });
      gsap.set(".navicon", { scale: 0, transformOrigin: "50% 50%" });

      // ---------- 1) phone appears; the app is loading on a black screen ----------
      tl.to("#phone", { autoAlpha: 1, duration: 0.3, ease: "power2.out" }, 0);
      // logo fades in and scales 0.9 → 1.0 slowly over one second
      tl.to("#logo", { autoAlpha: 1, duration: 0.3, ease: "power1.out" }, 0.4);
      tl.fromTo("#logo", { scale: 0.9 }, { scale: 1.0, duration: 1.0, ease: "power2.out" }, 0.4);

      // ---------- 2) fast fade from black to the home screen ----------
      tl.to("#splash", { autoAlpha: 0, duration: 0.35, ease: "power2.inOut" }, 2.2);

      // ---------- 3) home builds in: staggered fade-up, top → bottom, 8 frames apart ----------
      const F8 = 8 / 30; // ≈ 0.267s
      const at = 2.55;
      sections.forEach((sel, i) => {
        tl.fromTo(sel, { autoAlpha: 0, y: 24 }, { autoAlpha: 1, y: 0, duration: 0.5, ease: "power3.out" }, at + i * F8);
      });

      // ---------- 4) bottom nav icons pop in last, all at once ----------
      tl.to(".navicon", { scale: 1, duration: 0.4, ease: "back.out(2.4)" }, at + 5 * F8 + 0.08);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
